---
################################################################################
# Slurm                                                                        #
################################################################################
# Slurm job scheduler configuration
# Playbook: slurm, slurm-cluster, slurm-perf, slurm-perf-cluster, slurm-validation
# slurm_version: ""
slurm_install_prefix: /usr/local
pmix_install_prefix: /opt/deepops/pmix
hwloc_install_prefix: /opt/deepops/hwloc
#slurm_user_home: /local/slurm
slurm_manage_gpus: true
#slurm_cluster_name: deepops
#slurm_username: slurm
slurm_password: ReplaceWithASecurePasswordInTheVault
#slurm_db_username: slurm
slurm_db_password: AlsoReplaceWithASecurePasswordInTheVault
#slurm_max_job_timelimit: UNLIMITED
#slurm_default_job_timelimit:

# Auto-detect GPUs using NVML
# See docs/slurm-cluster/nvml.md for details.
slurm_autodetect_nvml: true

# Ensure hosts file generation only runs across slurm cluster
hosts_add_ansible_managed_hosts_groups: ["slurm-cluster"]

# Enable Slurm high-availability mode
# NOTE: The location for Slurm saved state needs to reside in a location shared by all Slurm controller nodes
#       Ideally this is on external NFS server and not the primary control node, since its failure
#       would also take down that NFS share
slurm_enable_ha: false
slurm_ha_state_save_location: "/sw/slurm"

# Slurm configuration is auto-generated from templates in the `slurm` role.
# There are three levels of customization, from least to most invasive:
#
# 1) Tunables (below) tweak individual slurm.conf options.
# 2) The *_raw lists inject literal, hand-tuned node/partition/gres lines while
#    keeping the role's best-practice base (the common case for fixed hardware).
# 3) The *_conf_template vars point at your OWN template file for total control.
#    (Point them at an absolute path on the Ansible controller, e.g. under config/.)
#
#slurm_conf_template: "{{ inventory_dir }}/files/slurm/slurm.conf.j2"
#slurm_cgroup_conf_template: "{{ inventory_dir }}/files/slurm/cgroup.conf.j2"
#slurm_gres_conf_template: "{{ inventory_dir }}/files/slurm/gres.conf.j2"
#slurm_dbd_conf_template: "{{ inventory_dir }}/files/slurm/slurmdbd.conf.j2"
#slurm_job_submit_template: "{{ inventory_dir }}/files/slurm/job_submit.lua"

# --- Server-specific hardware (option 2) ------------------------------------
# Literal lines that replace the auto-detected node/partition/gres sections.
# Leave empty ([]) to auto-detect CPUs/GPUs/memory from gathered facts.
# Keep these in your git-untracked config/ (see the private-repo note at the end).
# Examples are realistic modern 8-GPU AI nodes; adjust NodeAddr, CPU/RealMemory,
# the gpu Type, and counts to your hardware. Mix node types freely (one line each).
#slurm_nodes_raw:
#  - "NodeName=b200-[01-16] NodeAddr=10.0.0.[1-16] CPUs=112 Boards=1 SocketsPerBoard=2 CoresPerSocket=56 ThreadsPerCore=1 RealMemory=2063000 Gres=gpu:b200:8 State=UNKNOWN"
#  - "NodeName=h100-[01-08] NodeAddr=10.0.1.[1-8] CPUs=112 Boards=1 SocketsPerBoard=2 CoresPerSocket=56 ThreadsPerCore=1 RealMemory=2063000 Gres=gpu:h100:8 State=UNKNOWN"
#  # other GPU types use the same shape -- change Gres=gpu:<type>:<count> (e.g. h200, b300, l40s)
#slurm_partitions_raw:
#  - "PartitionName=b200 Nodes=b200-[01-16] Default=YES State=UP DefCpuPerGPU=14 DefMemPerCPU=16000 MaxTime=7-00:00:00 OverSubscribe=NO"
#  - "PartitionName=h100 Nodes=h100-[01-08] State=UP DefCpuPerGPU=14 DefMemPerCPU=16000 MaxTime=7-00:00:00 OverSubscribe=NO"
#slurm_gres_raw:
#  - "NodeName=b200-[01-16] AutoDetect=nvml"
#  - "NodeName=h100-[01-08] AutoDetect=nvml"

# --- AI/ML slurm.conf tunables (role defaults are sensible; override here) -----
#slurm_accounting_tres: "gres/gpu,gres/gpu:h100,gres/gpu:b200"  # typed GPU billing -- one gres/gpu:<type> per GPU model
#slurm_tres_billing_weights: "CPU=1.0,Mem=0.25G,GRES/gpu=2.0"  # global GPU billing weights (or per-partition TRESBillingWeights)
#slurm_accounting_enforce: "associations,limits,qos"  # enforce associations/limits/QOS (after sacctmgr; add 'safe')
#slurm_scheduler_parameters: ""  # backfill scheduler tuning (empty = default backfill)
#slurm_enable_preempt: true  # QOS preemption (PreemptType=preempt/qos, PreemptMode=REQUEUE)
#slurm_min_job_age: 300  # completed-job in-memory retention (seconds)
#slurm_return_to_service: 1  # DOWN node returns: 0=manual, 1=if non-responsive, 2=always
#slurm_prolog_flags: "Alloc,Serial,Contain"  # Serial = run prolog/epilog serially per node; Contain implies Alloc
#slurm_select_type_parameters: "CR_Core_Memory,CR_CORE_DEFAULT_DIST_BLOCK"  # cons_tres select; CR_ONE_TASK_PER_CORE = one task per core
#slurm_priority_flags: "DEPTH_OBLIVIOUS"  # DEPTH_OBLIVIOUS = depth-insensitive fairshare
#slurm_priority_decay_halflife: "7-0"  # fairshare usage half-life (e.g. 3-0 = 3 days)
#slurm_priority_weight_fairshare: 100000  # fairshare weight (its ratio to PriorityWeightQOS=10000 matters)
#slurm_dbd_commit_delay: 1  # slurmdbd: batch DB commits (recommended for high throughput)
#slurm_topology_plugin: "topology/tree"  # multi-rack clusters (needs topology.conf)
#slurm_acct_account: compute-account  # sacctmgr account new users are added to
#slurm_acct_organization: deepops  # sacctmgr Organization label
#slurmctl_config_dir: /sw/.slurm  # NFS-shared dir when slurm_conf_symlink: true
#slurm_ha_state_save_location: /sw/slurm  # shared storage when slurm_enable_ha: true
#slurm_exporter_container: "your-registry/prometheus-slurm-exporter:tag"  # custom slurm exporter image

# --- Alertmanager Slack alerts (empty = no slack receiver) --------------------
#alertmanager_slack_api_url: "https://hooks.slack.com/services/T000/B000/XXXX"
#alertmanager_slack_channel: "#alerts"

# --- job_submit.lua (optional Lua submit filter) -----------------------------
# DeepOps ships no routing template -- write your OWN job_submit.lua, drop it in
# config/files/slurm/, and point Slurm at it (used verbatim). Docs:
# https://slurm.schedmd.com/job_submit_plugins.html
#slurm_job_submit_plugins: "lua"
#slurm_job_submit_template: "{{ inventory_dir }}/files/slurm/job_submit.lua"

# --- Keeping server-specific settings out of git -----------------------------
# The outer deepops repo ignores config/ (.gitignore: /config*/), so site data and
# secrets live ONLY in your copy. Manage it as a separate PRIVATE repo:
#   cp -r config.example config
#   cd config && git init && git remote add origin git@github.com:yourorg/deepops-config.git
#   ansible-vault encrypt group_vars/slurm-cluster.yml   # encrypts slurm_password etc.

################################################################################
# Login on compute
################################################################################
# Restrict user SSH access to only allow users with a running job
slurm_restrict_node_access: true

# List users who should always be able to SSH, even without a running job
slurm_allow_ssh_user: []

# Enable a Slurm compute node to also function as a login node.
# This is needed for the "single node Slurm cluster" configuration.
# See docs/slurm-cluster/slurm-single-node.md
slurm_login_on_compute: false

################################################################################
# Kubespray - necessary configuration for Docker setup                         #
################################################################################
dns_mode: "none"
dns_late: false

################################################################################
# Optional installs                                                            #
################################################################################
slurm_configure_etc_hosts: true
slurm_cluster_install_cuda: false
slurm_cluster_install_nvidia_driver: true
slurm_cluster_install_singularity: false

################################################################################
# NFS                                                                          #
################################################################################
# NFS server exports (man 5 exports). Option notes:
# - no_subtree_check: modern recommended default (reliability; the man page advises it).
# - sync: data hits disk before the write is acked (crash-safe). Use async only for
#   scratch/temporary data where throughput matters more than durability.
# - no_root_squash: lets the head node's root manage these trees (common in HPC) but is
#   a security risk if any client is untrusted -- prefer root_squash where you can.
# - "*" exports to ANY host -- restrict to your cluster subnet (e.g. 10.0.0.0/16(...)).
nfs_exports:
  - path: /home    # shared home dirs (needed for Open OnDemand)
    options: "*(rw,sync,no_root_squash,no_subtree_check)"
  - path: /sw      # shared software (Spack / EasyBuild / CUDA modules)
    options: "*(rw,sync,no_root_squash,no_subtree_check)"
nfs_mounts:
  # Client mount options below are a starting point -- tune per your network and
  # storage. nconnect (parallel TCP connections) is the main lever: ~4 on 10/25GbE,
  # 8-16 on 100GbE+. On a NetApp/ONTAP filer cap rsize/wsize at 262144; on an
  # InfiniBand fabric consider proto=rdma. Add ",fsc" for FS-Cache (cachefilesd role).
  # See docs/slurm-cluster/slurm-nfs.md and `man 5 nfs`.
  - mountpoint: /home
    server: '{{ groups["slurm-master"][0] }}'
    path: /home
    options: rw,hard,vers=4.2,nconnect=16,rsize=1048576,wsize=1048576,proto=tcp,timeo=600,retrans=2,noatime,_netdev,nofail
  - mountpoint: /sw
    server: '{{ groups["slurm-master"][0] }}'
    path: /sw
    options: rw,hard,vers=4.2,nconnect=16,rsize=1048576,wsize=1048576,proto=tcp,timeo=600,retrans=2,noatime,_netdev,nofail

# NFS performance tuning (applies on server + clients). The nfs role ships
# auto-sized defaults; override here only if needed. See
# docs/slurm-cluster/slurm-nfs.md.
#nfs_server_threads: 128     # nfsd thread count (default: 4 x vCPUs, floor 64)
#nfs_tune_network: true      # raise TCP/socket buffers for high-bandwidth NFS (default true)

# Flags for enable/disable of NFS deployment
#  - Set up an NFS server on nfs-server?
slurm_enable_nfs_server: true
#  - Mount NFS filesystems on nfs-clients?
slurm_enable_nfs_client_nodes: true

# Inventory host groups to use for NFS server or clients
nfs_server_group: "slurm-master[0]"
nfs_client_group: "slurm-master[1:],slurm-node"

# Flags for sharing slurm.conf among compute and control nodes
slurm_conf_symlink: false

################################################################################
# SOFTWARE MODULES (SM)                                                        #
#   May be built with either EasyBuild or Spack                                #
################################################################################
slurm_install_lmod: true

# Note: the sm_prefix must be in an NFS-shared location
sm_prefix: "/sw"

# Easybuild-specific
sm_module_root: "{{ sm_prefix }}/modules"
sm_software_path: "{{ sm_prefix }}/software"
sm_files_path: "{{ sm_prefix }}/easybuild_files"
sm_sources_path: "{{ sm_prefix }}/sources"
sm_build_path: "{{ sm_prefix }}/build"
sm_files_url: "https://github.com/DeepOps/easybuild_files.git"
sm_install_default: true
sm_module_path: "{{ sm_module_root }}/all"

# Spack-specific
spack_install_dir: "{{ sm_prefix }}/spack"
spack_build_packages: false
# Illustrative only (spack_build_packages is false by default). Latest CUDA as the
# single example spec -- `cuda` with no version lets Spack pick its newest. (CUDA
# is also available as Lmod modules via the nvidia_cuda_toolkit role.)
spack_default_packages:
- "cuda"

# Which host should we run installs on for software going into the NFS share?
sm_install_host: "slurm-master[0]"

# CUDA toolkits as Lmod modules (playbooks/slurm-cluster/nvidia-cuda-toolkit.yml).
# Installs CUDA toolkits from the official runfiles into {{ sm_prefix }}/cuda and
# exposes each as `module load cuda/<version>`. Driver is never touched. Opt-in:
# run the playbook explicitly. Installs once on the NFS server, visible on every
# node. The role ships the full "latest patch of each minor, 11.8..13.3" list;
# trim it here to just the toolkits you want (each entry needs the exact runfile
# name from https://developer.nvidia.com/cuda-toolkit-archive):
#cuda_versions:
#  - {version: "12.4.1", runfile: "cuda_12.4.1_550.54.15_linux.run"}
#  - {version: "12.8.2", runfile: "cuda_12.8.2_570.211.01_linux.run"}
#  - {version: "13.3.0", runfile: "cuda_13.3.0_610.43.02_linux.run"}
# Where the toolkits and their modulefiles land (default: alongside the Lmod tree
# so `module avail` finds them with no extra MODULEPATH wiring):
#cuda_prefix: "{{ sm_prefix }}"
#cuda_modroot: "{{ sm_module_path }}"

################################################################################
# NVIDIA HPC SDK                                                               #
################################################################################
# Off by default (Spack is likewise opt-in via playbooks/slurm-cluster/spack-modules.yml).
slurm_install_hpcsdk: false

# Select the version of HPC SDK to download
#hpcsdk_major_version: ""
#hpcsdk_minor_version: ""
#hpcsdk_file_cuda: ""
#hpcsdk_arch: "x86_64"
#hpcsdk_default_cuda: ""

# In a Slurm cluster, default to setting up HPC SDK as modules rather than in
# the default user environment
hpcsdk_install_as_modules: true
hpcsdk_install_in_path: false

################################################################################
# OpenMPI build                                                                #
#                                                                              #
# The openmpi.yml playbook will build a custom-configured OpenMPI based on the #
# Slurm, PMIx, and hwloc on the cluster. In most cases you should be fine with #
# using the OpenMPI provided in the HPC SDK, but if you need a custom build,   #
# this can help you get started.
################################################################################
slurm_cluster_install_openmpi: false
#openmpi_version:
openmpi_install_prefix: "/usr/local"
# OpenMPI 5.0.x built against the external PMIx + hwloc that Slurm uses (SchedMD
# best practice). v5 removed --with-pmi/--with-slurm; `srun --mpi=pmix` needs only
# --with-pmix. (On OpenMPI 4.x add back --with-pmi/--with-slurm and use a
# libevent path instead of =external.)
openmpi_configure: "./configure --prefix={{ openmpi_install_prefix }} --disable-dependency-tracking --disable-getpwuid --with-pmix={{ pmix_install_prefix }} --with-hwloc={{ hwloc_install_prefix }} --with-libevent=external"

################################################################################
# Open OnDemand                                                                #
################################################################################
install_open_ondemand: false
# OOD Linux-host adapter requires `slurm_cluster_install_singularity` to be true
ood_install_linuxhost_adapter: false

servername: '{{ ansible_fqdn }}'
httpd_port: 9050
httpd_listen_addr_port:
  - 9050
httpd_use_rewrites: false
node_uri: /node
rnode_uri: /rnode

################################################################################
# Allow the User Permission to Set GPU Clocks                                  #
################################################################################
allow_user_set_gpu_clocks: false

################################################################################
# Enroot & Pyxis                                                               #
################################################################################
slurm_install_enroot: true
slurm_install_pyxis: true
#slurm_pyxis_version:

# /run is default partition of pyxis runtime_path
resize_run_partition: false

# /run tmpfs size. ubuntu default is 10%
pyxis_run_tmpfs_size: 50%

################################################################################
# Node Health Check                                                            #
################################################################################
slurm_install_nhc: true
slurm_health_check_program: "/usr/sbin/nhc"

# The health check configuration generated by default in DeepOps is pretty
# basic, and most cluster administrators will want to set up more extensive
# NHC configurations with their local site customizations.
# To set a custom file for Ansible to provision to /etc/nhc/nhc.conf, set the
# following var:
#
#nhc_config_template: "/path/to/custom/nhc.conf"
#
# For documentation on the file format, see:
# https://github.com/mej/nhc/blob/master/README.md

################################################################################
# Container registry                                                           #
################################################################################
slurm_enable_container_registry: true
docker_insecure_registries: "{{ groups['slurm-master'] | map('regex_replace', '^(.*)$', '\\1:5000') | list + ['registry.local:31500'] }}"
docker_registry_mirrors: "{{ groups['slurm-master'] | map('regex_replace', '^(.*)$', 'http://\\1:5000') | list }}"

################################################################################
# Monitoring stack                                                             #
################################################################################
slurm_enable_monitoring: true

# Inventory host groups where cluster monitoring services will be installed
# (Prometheus, Grafana, etc)
slurm_monitoring_group: "slurm-master"

# Grafana web UI port (role default 3000). Override if 3000 is taken.
#grafana_port: 3001

################################################################################
# Logging with rsyslog                                                         #
################################################################################
slurm_enable_rsyslog_server: true
slurm_enable_rsyslog_client: true
rsyslog_server_hostname: "{{ groups['slurm-master'][0] }}"
rsyslog_client_tcp_host: "{{ rsyslog_server_hostname }}"
rsyslog_client_group: "slurm-cluster"
