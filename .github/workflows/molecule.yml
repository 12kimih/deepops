---
name: test ansible roles with molecule
on:
  - push
  - pull_request
jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        deepops-role:
          - cachefilesd
          - facts
          - kerberos_client
          - lmod
          - nfs
          - nhc
          - nvidia_dcgm
          - openmpi
          - openshift
          - mofed
          - spack
          # Excluded from Docker CI (require systemd services that can't
          # run in containers): nis_client, rsyslog_client, rsyslog_server,
          # slurm. Tested end-to-end on real MAAS VMs instead.
          # Also excluded: singularity_wrapper (broken upstream Galaxy dep)
    steps:
      - name: check out repo
        uses: actions/checkout@v4
        with:
          path: "${{ github.repository }}"
      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible==10.7.0 passlib
          python3 -m pip install molecule molecule-plugins[docker] docker
      - name: cache galaxy roles and collections
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/${{ github.repository }}/roles/galaxy
            ~/.ansible/collections
          key: molecule-galaxy-${{ hashFiles(format('{0}/roles/requirements.yml', github.repository)) }}
          restore-keys: molecule-galaxy-
      - name: run molecule test
        env:
          ANSIBLE_ROLES_PATH: "${{ github.workspace }}/${{ github.repository }}/roles/galaxy:${{ github.workspace }}/${{ github.repository }}/roles"
        run: |
          cd "${{ github.repository }}/roles"
          # Galaxy downloads from GitHub occasionally time out. The cache above makes most
          # runs skip them entirely (no --force, so already-present roles are reused); for a
          # cold cache we retry with increasing backoff before failing the job.
          ok=0
          for attempt in 1 2 3 4 5; do
            if ansible-galaxy role install -r ./requirements.yml \
               && ansible-galaxy collection install -r ./requirements.yml; then
              ok=1; break
            fi
            echo "::warning::ansible-galaxy install failed (attempt ${attempt}/5); retrying in $((attempt * 20))s"
            sleep "$((attempt * 20))"
          done
          [ "$ok" = 1 ] || { echo "::error::ansible-galaxy install failed after 5 attempts"; exit 1; }
          cd "${{ matrix.deepops-role }}"
          molecule test
