---
# Verify NCCL GPU peer-to-peer (P2P) enablement on every compute node:
#   1. PCIe ACS is disabled on all PCI devices (ground truth: ACS Control register
#      readback) and the persistent disable-acs unit is enabled/active.
#   2. IOMMU/VT-d posture (read-only audit): BIOS VT-d state via the DMAR ACPI
#      table, and the kernel intel_iommu/iommu setting actually in effect.
# The play FAILS only if ACS is still enabled somewhere; the IOMMU section is
# informational so you can audit BIOS VT-d state across the fleet without
# rebooting into firmware setup.
- hosts: "{{ hostlist | default('slurm-node') }}"
  become: true
  gather_facts: false
  tags:
    - nvidia
    - verify-acs
  tasks:
    - name: Read the ACS Control register from every PCI device
      ansible.builtin.shell: |
        set -o pipefail
        offenders=""
        for dev in $(lspci -d '*:*:*' | awk '{print $1}'); do
          val=$(setpci -s "$dev" ECAP_ACS+0x6.w 2>/dev/null) || continue
          if [ -n "$val" ] && [ "$val" != "0000" ]; then
            offenders="${offenders}${dev} ACSCtl=0x${val} $(lspci -s "$dev" | cut -d' ' -f2-)\n"
          fi
        done
        printf '%b' "$offenders"
      args:
        executable: /bin/bash
      register: acs_state
      changed_when: false
      failed_when: false

    - name: Check the disable-acs systemd unit is enabled and active
      ansible.builtin.shell: |
        printf 'enabled=%s active=%s' \
          "$(systemctl is-enabled disable-acs.service 2>/dev/null || echo missing)" \
          "$(systemctl is-active  disable-acs.service 2>/dev/null || echo inactive)"
      args:
        executable: /bin/bash
      register: acs_unit
      changed_when: false
      failed_when: false

    - name: Detect BIOS VT-d / IOMMU via the DMAR ACPI table
      ansible.builtin.stat:
        path: /sys/firmware/acpi/tables/DMAR
        get_checksum: false
        get_mime: false
        get_attributes: false
      register: dmar_table

    - name: Read the kernel IOMMU setting in effect
      ansible.builtin.shell: |
        set -o pipefail
        cmd=$(cat /proc/cmdline)
        intel=$(printf '%s' "$cmd"  | grep -o 'intel_iommu=[^ ]*' || true)
        amd=$(printf '%s'   "$cmd"  | grep -o 'amd_iommu=[^ ]*'   || true)
        mode=$(printf '%s' " $cmd"  | grep -oE ' iommu=[^ ]*' | tr -d ' ' || true)
        groups=$(ls /sys/kernel/iommu_groups/ 2>/dev/null | wc -l)
        printf '%s %s %s groups=%s' \
          "${intel:-intel_iommu=unset}" "${amd:-}" "${mode:-}" "$groups"
      args:
        executable: /bin/bash
      register: iommu_kernel
      changed_when: false
      failed_when: false

    # ---- Report ----
    - name: Report PCI devices where ACS is still enabled
      ansible.builtin.debug:
        msg: "{{ acs_state.stdout_lines }}"
      when: (acs_state.stdout | trim) != ''

    - name: Report ACS all-clear
      ansible.builtin.debug:
        msg: "OK - ACS disabled on all PCI devices on {{ inventory_hostname }}"
      when: (acs_state.stdout | trim) == ''

    - name: Report IOMMU / VT-d posture (read-only audit)
      ansible.builtin.debug:
        msg:
          - "VT-d in BIOS (DMAR ACPI table): {{ 'ON' if dmar_table.stat.exists else 'OFF (firmware default / disabled)' }}"
          - "kernel IOMMU: {{ iommu_kernel.stdout | trim }}"
          - "disable-acs.service: {{ acs_unit.stdout | trim }}"
          - "ACS effective state: {{ 'DISABLED (P2P ready)' if (acs_state.stdout | trim) == '' else 'ENABLED on some devices' }}"

    - name: Warn if the disable-acs unit will not persist across reboots
      ansible.builtin.debug:
        msg: >-
          WARNING - disable-acs.service is not enabled+active on
          {{ inventory_hostname }}; ACS may be re-enabled on next reboot. Run
          playbooks/utilities/disable-acs.yml to install the persistent unit.
      when: acs_unit.stdout is not search('enabled=enabled active=active')

    - name: Fail if ACS is still enabled on any PCI device
      ansible.builtin.assert:
        that:
          - (acs_state.stdout | trim) == ''
        fail_msg: >-
          PCIe ACS is still enabled on one or more devices - NCCL GPU P2P will be
          degraded. See the per-device report above.
        success_msg: "PCIe ACS is disabled on every PCI device."
  environment: "{{ proxy_env if proxy_env is defined else {} }}"
