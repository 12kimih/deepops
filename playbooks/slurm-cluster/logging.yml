---
- hosts: slurm-master[0]
  become: true
  vars:
    elasticsearch_network_host: 0.0.0.0
  pre_tasks:
    - name: Debian - ensure apt cache updated
      ansible.builtin.apt:
        update_cache: true
      when: ansible_os_family == "Debian"
  roles:
    - robertdebock.java
    - robertdebock.elastic_repo
    - robertdebock.elasticsearch
    - robertdebock.logstash
    - robertdebock.kibana

- hosts: slurm-master[0]
  become: true
  vars:
    # Logstash beats-input port; override logstash_beats_port in config/ if 5000
    # is taken. (Play-level default so the literal isn't baked into the template.)
    filebeat_port: "{{ logstash_beats_port | default('5000') }}"
  tasks:
    - name: Configure logstash to accept logs from filebeat
      ansible.builtin.template:
        src: "filebeat.conf"
        dest: "/etc/logstash/conf.d/filebeat.conf"
        owner: "root"
        group: "root"
        mode: "0644"

# Mitigation for CVE-2021-44228 impacting Log4j2
# https://discuss.elastic.co/t/apache-log4j2-remote-code-execution-rce-vulnerability-cve-2021-44228-esa-2021-31/291476
- hosts: slurm-master[0]
  become: true
  tasks:
    - name: Configure elasticsearch to mitigate CVE-2021-44228
      ansible.builtin.copy:
        src: "cve_2021_44228.options"
        dest: "/etc/elasticsearch/jvm.options.d/cve_2021_44228.options"
        owner: "root"
        group: "root"
        mode: "0644"
      notify:
        - Restart-elasticsearch
    - name: Check for relevant class in logstash
      ansible.builtin.shell: unzip -l /usr/share/logstash/logstash-core/lib/jars/log4j-core-2.* | grep JndiLookup.class
      register: logstash_jndi
      changed_when: logstash_jndi.rc == 0
      failed_when: logstash_jndi.rc == 2
    - name: Configure logstash to mitigate CVE-2021-44228
      ansible.builtin.shell: zip -q -d /usr/share/logstash/logstash-core/lib/jars/log4j-core-2.* org/apache/logging/log4j/core/lookup/JndiLookup.class
      notify:
        - Restart-logstash
      when: logstash_jndi.changed
    - name: Manually stop logstash as restart is not consistently working later
      ansible.builtin.service:
        name: logstash
        state: stopped
      notify:
        - Restart-logstash
      when: logstash_jndi.changed
  handlers:
    - name: Restart-elasticsearch
      ansible.builtin.service:
        name: elasticsearch
        state: restarted
    - name: Restart-logstash
      ansible.builtin.service:
        name: logstash
        state: restarted

- hosts: slurm-cluster
  become: true
  vars:
    filebeat_create_config: true
    filebeat_inputs:
      - input_type: log
        paths:
          - "/var/log/*.log"
          - "/var/log/syslog"
          - "/var/log/slurm/*.log"
          - "/var/log/apt/*.log"
    filebeat_output_logstash_hosts:
      - "{{ groups['slurm-master'][0] }}:5000"
  roles:
    - geerlingguy.filebeat
