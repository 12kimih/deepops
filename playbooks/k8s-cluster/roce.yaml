---
# Playbook for installation SR-IOV DP with CNI and corresponded prerequisites
- hosts: all
  become: true
  become_method: sudo
  tasks:
    - ansible.builtin.include_role:
        name: roce_backend
        tasks_from: allhosts

- hosts: kube_node
  become: true
  become_method: sudo
  tasks:
    - name: Install docker-py
      ansible.builtin.pip:
        name: docker-py
    - name: Pull docker image nfvpe/sriov-device-plugin
      community.docker.docker_image:
        name: "nfvpe/sriov-device-plugin"
        state: present
        pull: true
    - name: Pull docker image nfvpe/sriov-cni
      community.docker.docker_image:
        name: "nfvpe/sriov-cni"
        state: present
        pull: true

- hosts: kube_control_plane
  become: true
  become_method: sudo
  tasks:
    - ansible.builtin.include_role:
        name: roce_backend
        tasks_from: k8smaster
