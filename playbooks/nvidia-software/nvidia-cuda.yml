---
# Install the NVIDIA CUDA toolkit (and the driver, unless installed separately).
#
# Set nvidia_cuda_install: false to skip the system-wide toolkit install (for
# example when CUDA is provided per-version through Lmod/environment modules).
- hosts: all
  become: true
  tasks:
    - name: Check for DGX packages
      ansible.builtin.stat:
        path: /etc/dgx-release
      register: is_dgx

    - name: Install custom facts
      ansible.builtin.include_role:
        name: facts

    - name: Install the NVIDIA driver
      ansible.builtin.include_role:
        name: nvidia_driver
      when:
        - ansible_local['gpus']['count'] | int > 0
        - not is_dgx.stat.exists
        - cuda_playbook_install_driver | default(true) | bool
      tags:
        - nvidia_driver

    - name: Install the NVIDIA CUDA toolkit
      ansible.builtin.include_role:
        name: nvidia_cuda
      when: nvidia_cuda_install | default(true) | bool
  environment: "{{ proxy_env if proxy_env is defined else {} }}"
