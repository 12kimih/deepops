---
- hosts: "{{ hostlist | default('all') }}"
  become: true
  tags:
    - nvidia
    - nvidia_driver
  tasks:
    - name: Check for DGX packages
      ansible.builtin.stat:
        path: /etc/dgx-release
      register: is_dgx

    - name: Install custom facts
      ansible.builtin.include_role:
        name: facts

    # DGX systems ship their own driver stack (see the nvidia-dgx role), so the
    # driver is only installed on non-DGX hosts that have GPUs (or when forced).
    - name: Install the NVIDIA driver
      ansible.builtin.include_role:
        name: nvidia_driver
      when: >-
        (ansible_local['gpus']['count'] | int > 0 and not is_dgx.stat.exists)
        or (nvidia_driver_force_install | default(false) | bool)
  environment: "{{ proxy_env if proxy_env is defined else {} }}"
