---
- hosts: slurm-master
  tasks:
    - name: Set controller fact
      ansible.builtin.set_fact:
        is_controller: true
      tags: always

- hosts: slurm-node
  tasks:
    - name: Set compute fact
      ansible.builtin.set_fact:
        is_compute: true
      tags: always

- hosts: slurm-cluster
  become: true
  tasks:
    - name: Set enroot DGX config fact
      ansible.builtin.set_fact:
        enroot_environ_config_files: "{{ enroot_environ_config_files_dgx }}"
      when: ansible_product_name is search("DGX")

# enroot and pyxis are installed on both login (slurm-master) and compute
# (slurm-node) hosts so containers can be imported and launched from either.
- hosts: slurm-cluster
  become: true
  roles:
    - name: enroot

- hosts: slurm-cluster
  become: true
  roles:
    - name: pyxis
