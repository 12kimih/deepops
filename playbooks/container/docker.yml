---
# Install the Docker engine in-tree (roles/docker), following Docker's official
# instructions (https://docs.docker.com/engine/install/), instead of the kubespray
# submodule's container-engine/docker role (which used the deprecated apt_key + .list
# method). Used by the Slurm monitoring stack (prometheus/grafana/exporters) and
# ngc-ready. Kubernetes uses its own container runtime (containerd by default) set up
# by kubespray, not this playbook.
- hosts: "{{ hostlist | default('all') }}"
  become: true
  become_method: sudo
  tags:
    - docker
  pre_tasks:
    # DGX OS ships a docker-override.conf with options that conflict with a stock
    # install; remove it before installing Docker.
    - name: Remove the DGX docker systemd override if present
      ansible.builtin.file:
        path: /etc/systemd/system/docker.service.d/docker-override.conf
        state: absent
      when: docker_install | default(true)
  roles:
    - role: docker
      when: docker_install | default(true)
  environment: "{{ proxy_env if proxy_env is defined else {} }}"
