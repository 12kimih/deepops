#
# an ansible role to install easy_build:
#
---
- name: "Install needed packages"
  become: true
  ansible.builtin.apt:
    name: python3-setuptools
    state: present
  when: ansible_os_family == "Debian"

- name: "Install needed packages"
  become: true
  ansible.builtin.dnf:
    name: python3-setuptools
    state: present
  when: ansible_os_family == "RedHat"

- name: "Rm previous tmp folders"
  ansible.builtin.file:
    path: "{{ eb_tmp_dir }}"
    state: absent
    force: true

- name: "Check if easybuild is installed"
  ansible.builtin.find:
    paths: "{{ sm_software_path }}/EasyBuild/"
    file_type: file
    patterns: "^eb$"
    use_regex: true
    recurse: true
  register: ebsw_exe
  ignore_errors: true

- name: "Mkdir tmp folders"
  ansible.builtin.file:
    path: "{{ eb_tmp_dir }}"
    state: directory
    force: true
    recurse: true
    mode: "u=rwx,g=rwx,o=rx"
  when: not ebsw_exe.matched

- name: "Download bootstrap script"
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.dest }}"
    mode: "u=rwx,g=rwx,o=rx"
    force: true
  register: eb_bootstrap_download
  until: eb_bootstrap_download is succeeded
  retries: 5
  delay: 10
  with_items:
    - url: "{{ eb_bootstrap_url }}"
      dest: "/tmp"
  when: not ebsw_exe.matched

#
# Ansible doesn't run task in a login shell, so we have to source the
# EasyBuild config manually. We might want to create some abstraction for this.
#
- name: "Install latest EasyBuild version"
  ansible.builtin.shell: . /etc/profile && python3 /tmp/bootstrap_eb.py {{ eb_tmp_dir }}
  args:
    executable: /bin/bash
  when: not ebsw_exe.matched

- name: "Get EasyBuild version"
  become: true
  ansible.builtin.command: ls {{ eb_tmp_dir }}/software/EasyBuild/
  args:
    executable: /bin/bash
  register: ebsw_version
  when: not ebsw_exe.matched

- name: "Patch EasyBuild module"
  ansible.builtin.lineinfile:
    dest: "{{ eb_tmp_dir }}/modules/all/EasyBuild/{{ ebsw_version.stdout }}.lua"
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  with_items:
    - regexp: "^local root .*$"
      line: 'local root = "{{ sm_software_path }}/EasyBuild/{{ ebsw_version.stdout }}"'
  when: not ebsw_exe.matched

- name: Ensure directory ownership is correct for software paths
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ ansible_user }}"
    state: "directory"
    recurse: true
  with_items:
    - "{{ sm_software_path }}"
    - "{{ sm_module_root }}"
    - "{{ sm_files_path }}"
    - "{{ sm_sources_path }}"
    - "{{ sm_build_path }}"

- name: "Cp EasyBuild software"
  ansible.builtin.command: cp -R "{{ eb_tmp_dir }}/software/EasyBuild" "{{ sm_software_path }}"
  when: not ebsw_exe.matched

- name: "Cp EasyBuild module"
  ansible.builtin.command: cp -R "{{ eb_tmp_dir }}/modules/all/EasyBuild" "{{ sm_module_path }}"
  when: not ebsw_exe.matched

- name: "Rm EasyBuild tmp directories"
  ansible.builtin.file:
    path: "{{ eb_tmp_dir }}"
    state: absent
    force: true
  when: not ebsw_exe.matched

- name: "Configure sh profile"
  become: true
  ansible.builtin.template:
    src: templates/z01_eb.sh
    dest: /etc/profile.d
    owner: root
    group: root
    mode: "0777"
  when: not ebsw_exe.matched
  tags:
    - configuration

- name: "Configure csh profile"
  become: true
  ansible.builtin.template:
    src: templates/z01_eb.csh
    dest: /etc/profile.d
    owner: root
    group: root
    mode: "0777"
  when: not ebsw_exe.matched
  tags:
    - configuration
