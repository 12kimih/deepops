---
install_from_src: false

# EL8/9/10: httpd is the base-OS package (no EL7 Software Collections httpd24).
ood_apache_service_name: httpd.service
ood_htpasswd_file: /etc/httpd/.htpasswd

ood_url_turbovnc_pkg: https://downloads.sourceforge.net/project/turbovnc/2.2.4/turbovnc-2.2.4.x86_64.rpm

ood_master_sw_deps:
  - lz4-devel
  - unzip
  - python3-websockify

ood_client_sw_deps:
  - lz4-devel
  - unzip
  - nmap
  - python3-websockify
  - "@xfce4"
  - xfce4-session
  - xfce4-settings
  - xfce4-terminal
  - xfdesktop
  - gtk2-engines
  - python3-jupyter-core
  - dbus-x11
  - firefox
