---
- name: Create pyxis source dir
  ansible.builtin.file:
    path: /usr/local/src/pyxis
    state: directory
    mode: "0755"
  tags: pyxis

- name: Copy pyxis source
  ansible.builtin.unarchive:
    src: "{{ slurm_pyxis_tarball_url }}"
    remote_src: true
    dest: /usr/local/src/pyxis
    extra_opts:
      - --strip-components=1
  tags: pyxis

- name: Clean pyxis source directory
  ansible.builtin.command:
    chdir: /usr/local/src/pyxis
    argv:
      - make
      - clean
  register: pyxis_make_clean
  failed_when: false
  changed_when: pyxis_make_clean.rc == 0
  tags: pyxis

- name: Build pyxis
  ansible.builtin.command:
    chdir: /usr/local/src/pyxis
    argv:
      - make
      - -j
  environment:
    CPPFLAGS: "-I {{ slurm_install_prefix }}/include/slurm"
  register: result
  changed_when: "result.stdout != \"make: Nothing to be done for 'all'.\""
  notify:
    - Restart slurmctld
    - Restart slurmd
  tags: pyxis

# `make install` places the plugin at {{ slurm_install_prefix }}/lib/slurm/spank_pyxis.so
# (a consistent, owned location) instead of running it from the source tree.
- name: Install pyxis
  ansible.builtin.command:
    chdir: /usr/local/src/pyxis
    argv:
      - make
      - install
      - "prefix={{ slurm_install_prefix }}"
  environment:
    CPPFLAGS: "-I {{ slurm_install_prefix }}/include/slurm"
  changed_when: true
  notify:
    - Restart slurmctld
    - Restart slurmd
  tags: pyxis

# Needed for 17.11, but not for 19.05. Doesn't hurt either way.
- name: Copy top-level plugstack file
  ansible.builtin.template:
    src: etc/slurm/plugstack.conf
    dest: "{{ slurm_config_dir }}/"
    mode: "0644"
  notify:
    - Restart slurmctld
    - Restart slurmd
  tags: pyxis

- name: Copy pyxis plugstack file
  ansible.builtin.template:
    src: etc/slurm/plugstack.conf.d/pyxis.conf
    dest: "{{ slurm_config_dir }}/plugstack.conf.d/"
    mode: "0644"
  notify:
    - Restart slurmctld
    - Restart slurmd
  tags: pyxis
