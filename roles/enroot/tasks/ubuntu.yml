---
# Ubuntu 23.10+/24.04 enable kernel.apparmor_restrict_unprivileged_userns=1 by
# default, blocking the unprivileged user namespaces enroot/pyxis rely on
# (enroot-nsenter is transitioned into the capability-denying 'unprivileged_userns'
# profile -> EPERM). enroot's .deb ships a SCOPED AppArmor profile
# (/etc/apparmor.d/enroot, loaded via dh_apparmor) that grants `allow userns create`
# to /usr/bin/enroot-nsenter ONLY, so the host-wide restriction stays ON -- the
# supported, security-preserving fix. Upstream: the sysctl "must be disabled
# (equal to 0) UNLESS {datadir}/enroot/apparmor.profile is installed" (the .deb
# installs it), so we do NOT disable it by default. The task below is an opt-in
# escape hatch that strips userns hardening host-wide (every unprivileged process,
# ~3.4x more reachable kernel attack surface) -- for trusted/dev nodes only.
#   https://github.com/NVIDIA/enroot/blob/main/doc/requirements.md
#   https://ubuntu.com/blog/ubuntu-23-10-restricted-unprivileged-user-namespaces
- name: Ubuntu | disable AppArmor unprivileged userns restriction (escape hatch)
  ansible.posix.sysctl:
    name: kernel.apparmor_restrict_unprivileged_userns
    value: "0"
    state: present
    sysctl_file: /etc/sysctl.d/90-enroot.conf
    reload: true
  failed_when: false  # key only exists on 23.10+ kernels
  when: enroot_apparmor_global_disable | bool

- name: Ubuntu | install enroot dependencies
  ansible.builtin.apt:
    name:
      - curl
      - gawk
      - jq
      - squashfs-tools
      - parallel
      - bash-completion
      - fuse-overlayfs
      - squashfuse
      - pigz
      - zstd
    state: present
    update_cache: true

- name: Ubuntu | gather installed package facts
  ansible.builtin.package_facts:
    manager: apt

# Direct .deb installs conflict on a version change, so remove first when the
# installed version differs from the target.
- name: Ubuntu | remove existing enroot before a version change
  ansible.builtin.apt:
    name: "{{ enroot_packages }}"
    state: absent
  when:
    - "'enroot' in ansible_facts.packages"
    - ansible_facts.packages['enroot'][0]['version'] != enroot_version_string

- name: Ubuntu | install enroot from the release .deb
  ansible.builtin.apt:
    deb: "{{ enroot_release_base_url }}/{{ item }}_{{ enroot_version_string }}_{{ _enroot_deb_arch }}.deb"
    state: "{{ enroot_package_state }}"
  loop: "{{ enroot_packages }}"
  notify: Reload enroot AppArmor profile
  environment: "{{ proxy_env if proxy_env is defined else {} }}"
