---
# Build deps come from the CodeReady Builder repo: "powertools" on EL8 and "crb"
# on EL9+ (Rocky/Alma/CentOS Stream); RHEL proper uses the subscription repo.
- name: Rocky/Alma/CentOS - enable the CodeReady Builder repo
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution != "Red Hat Enterprise Linux"
  block:
    - name: Ensure dnf-plugins-core is installed
      ansible.builtin.dnf:
        name: "dnf-plugins-core"
        state: "present"
    - name: Enable the CRB/powertools repo
      ansible.builtin.command: "dnf config-manager --set-enabled {{ 'powertools' if ansible_distribution_major_version == '8' else 'crb' }}"
      register: enable_crb
      changed_when: enable_crb.rc != 0

- name: RHEL - ensure the CodeReady Builder repository is enabled
  community.general.rhsm_repository:
    name: "codeready-builder-for-rhel-{{ ansible_distribution_major_version }}-x86_64-rpms"
  when: ansible_distribution == "Red Hat Enterprise Linux"

- name: Debian - ensure apt cache is up to date
  ansible.builtin.apt:
    update_cache: true
  when: ansible_os_family == "Debian"
  changed_when: false

- name: Create a folder for go
  ansible.builtin.file:
    path: "{{ golang_install_dir }}"
    recurse: true

- name: Install golang explicitly
  ansible.builtin.include_role:
    name: gantsign.golang

- name: Install singularity
  ansible.builtin.include_role:
    name: abims_sbr.singularity
