---
# While we would prefer to use the Ansible helm module, it's broken! :-(
# See https://github.com/ansible/ansible/pull/57897
# Unfortunately this will not be fixed until Ansible 2.10 which is not yet released.
# So for now we will run helm commands directly...

- name: Install nvidia k8s gpu device plugin helm repo
  ansible.builtin.command: /usr/local/bin/helm repo add nvdp "{{ k8s_gpu_plugin_helm_repo }}"
  changed_when: false

- name: Update helm repos
  ansible.builtin.command: /usr/local/bin/helm repo update
  changed_when: false

- name: Install nvidia k8s gpu device plugin
  ansible.builtin.command: /usr/local/bin/helm upgrade --install "{{ k8s_gpu_plugin_release_name }}" "{{ k8s_gpu_plugin_chart_name }}" --version "{{
    k8s_gpu_plugin_chart_version }}" --set "migStrategy={{ k8s_gpu_mig_strategy }}" --set "failOnInitError={{ k8s_gpu_plugin_init_error }}" --set
    affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key="nvidia\.com\/gpu\.count",affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].operator="Exists"
    --set allowDefaultNamespace=true --wait
  changed_when: false
