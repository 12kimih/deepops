---
- name: Ensure development tools are installed (Ubuntu)
  ansible.builtin.apt:
    update_cache: true
    name: "{{ item }}"
    state: "present"
  with_items: "{{ spack_ubuntu_deps }}"
  when: ansible_distribution == "Ubuntu"

- name: Ensure development tools are installed (Red Hat)
  ansible.builtin.package:
    name: "{{ item }}"
    state: "present"
  with_items: "{{ spack_redhat_deps }}"
  when: ansible_os_family == "RedHat"

- name: Ensure install directory exists
  ansible.builtin.file:
    path: "{{ spack_install_dir }}"
    owner: "{{ spack_user }}"
    group: "{{ spack_group }}"
    mode: "0755"
    state: "directory"

- name: Clone spack repository
  ansible.builtin.git:
    repo: "{{ spack_repo }}"
    dest: "{{ spack_install_dir }}"
    version: "{{ spack_version }}"
  register: spack_clone_download
  until: spack_clone_download is succeeded
  retries: 5
  delay: 10

- name: Set up spack profile scripts
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/profile.d/{{ item }}"
    owner: "root"
    group: "root"
    mode: "0755"
  with_items:
    - "z00_spack.sh"
    - "z00_spack.csh"

- name: Source spack environment once for initialization
  ansible.builtin.shell: |
    . /etc/profile.d/z00_spack.sh
  register: source_spack_env
  changed_when: source_spack_env.rc != 0

- name: Build spack packages
  ansible.builtin.shell: |
    . /etc/profile.d/z00_spack.sh &&
    spack install {{ item }}
  with_items: "{{ spack_default_packages }}"
  register: spack_build_result
  # `spack install` prints "already installed" and is a no-op when the spec is
  # present, so a re-run reports unchanged instead of always-changed.
  changed_when: "'already installed' not in spack_build_result.stdout"
  when: spack_build_packages
