---
# See the GitHub code repo: https://github.com/kubernetes-sigs/nfs-subdir-external-provisioner

- name: Install nfs-client-provisioner helm repo
  ansible.builtin.command: /usr/local/bin/helm repo add --force-update "{{ k8s_nfs_client_repo_name }}" "{{ k8s_nfs_client_helm_repo }}"
  changed_when: false

- name: Update helm repos
  ansible.builtin.command: /usr/local/bin/helm repo update
  changed_when: false

- name: Install nfs-client-provisioner
  ansible.builtin.command: /usr/local/bin/helm upgrade --install "{{ k8s_nfs_client_release_name }}" "{{ k8s_nfs_client_chart_name }}" --create-namespace
    --namespace deepops-nfs-client-provisioner --version "{{ k8s_nfs_client_chart_version }}" --set nfs.server="{{ k8s_nfs_server }}" --set nfs.path="{{
    k8s_nfs_export_path }}" --set storageClass.defaultClass="{{ k8s_nfs_default_sc }}" --wait
  changed_when: false
