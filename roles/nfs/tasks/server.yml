---
- name: Install ubuntu packages
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - nfs

- name: Ensure export path exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: "directory"
    mode: "0755"
  with_items: "{{ nfs_exports }}"
  notify: Restart nfs
  tags:
    - nfs

- name: Ensure statd is enabled
  ansible.builtin.service:
    name: rpc-statd
    enabled: true
    state: started
  notify:
    - Restart rpcbind
    - Restart nfs
  tags:
    - nfs

- name: Configure exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"
  notify: Restart nfs
  register: nfs_exports_copy
  tags:
    - nfs

# threads= in the [nfsd] section of /etc/nfs.conf is the modern nfs-utils knob
# (equivalent to the legacy RPCNFSDCOUNT). A restart applies it; verify with
# `cat /proc/fs/nfsd/threads`. https://man7.org/linux/man-pages/man8/rpc.nfsd.8.html
- name: Configure nfsd thread count
  community.general.ini_file:
    path: /etc/nfs.conf
    section: nfsd
    option: threads
    value: "{{ nfs_server_threads }}"
    mode: "0644"
  when: nfs_exports|length
  notify: Restart nfs
  tags:
    - nfs

- name: Ensure nfs server is running
  ansible.builtin.service:
    name: "{{ nfs_server_daemon }}"
    state: started
    enabled: true
  when: nfs_exports|length
  tags:
    - nfs
