---
- name: Gather OS specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution | lower }}.yml"
        - "{{ ansible_os_family | lower }}.yml"
      paths:
        - ../vars
      skip: true
  tags:
    - vars
    - nfs

- name: Install Ubuntu packages
  ansible.builtin.apt:
    name: nfs-common
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - nfs

- name: Install RHEL packages
  ansible.builtin.dnf:
    name: nfs-utils
    state: present
  when: ansible_os_family == "RedHat"
  tags:
    - nfs

- name: Configure idmapd domain for nfsv4
  ansible.builtin.lineinfile:
    dest: /etc/idmapd.conf
    regexp: "^Domain"
    insertafter: "^# Domain"
    line: "Domain = {{ nfs_idmapd_domain }}"
    backup: true
  when: nfs_idmapd_domain is defined
  tags:
    - nfs

# Raise TCP/socket buffers for the NFS data path on 10GbE+ links (applies on both
# NFS servers and clients). https://nfs.sourceforge.net/nfs-howto/ar01s05.html
- name: Tune the network buffers for NFS
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/30-nfs-tuning.conf
    sysctl_set: true
    state: present
    reload: true
  loop: "{{ nfs_network_sysctls | dict2items }}"
  when: nfs_tune_network | bool
  tags:
    - nfs

- name: Setup server
  ansible.builtin.include_tasks: server.yml
  when: nfs_is_server

- name: Setup firewall
  ansible.builtin.include_tasks: firewall.yml
  when: nfs_is_server

- name: Setup client
  ansible.builtin.include_tasks: client.yml
  when: nfs_is_client
