---
- name: Gather package facts
  ansible.builtin.package_facts:
    manager: rpm
  tags:
    - nfs
  when:
    - ansible_os_family == "RedHat"

- name: Gather service facts
  ansible.builtin.service_facts:
  tags:
    - nfs
  when:
    - ansible_os_family == "RedHat"

- name: Configure firewall to allow NFS server
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    state: enabled
    immediate: false
  with_items:
    - mountd
    - rpc-bind
    - nfs
  register: nfs_firewalld_rules
  tags:
    - nfs
  when:
    - ansible_os_family == "RedHat"
    - "'firewalld' in ansible_facts.packages"

# Only reload (permanent rules above used immediate: false) when a rule actually
# changed, so an unchanged re-run does not bounce firewalld every time.
- name: Restart firewalld if it was running
  ansible.builtin.systemd:
    state: restarted
    name: firewalld
  tags:
    - nfs
  notify:
    - Restart rpcbind
    - Restart nfs
  when:
    - ansible_os_family == "RedHat"
    - "'firewalld' in ansible_facts.packages"
    - "'firewalld.service' in ansible_facts.services"
    - ansible_facts.services['firewalld.service']['state'] == "running"
    - nfs_firewalld_rules is changed
