---
- name: Get a count of GPUs
  ansible.builtin.shell: "lspci -d 10de: | grep -iv audio | wc -l"
  register: gpu_count

# This bit seems a bit buggy depending on the OS
- name: Install cuda toolkit
  become: true
  ansible.builtin.package:
    name: nvidia-cuda-toolkit
    state: present
  when: gpu_test_install_toolkit

- name: Download CUDA samples
  ansible.builtin.git:
    repo: https://github.com/NVIDIA/cuda-samples.git
    clone: true
    dest: "{{ gpu_test_cuda_dir }}"
  when: gpu_test_build
  ignore_errors: true

- name: Build p2p sample
  ansible.builtin.shell: "cd {{ gpu_test_samples_dir }}/p2pBandwidthLatencyTest && make"
  when: gpu_test_build
  ignore_errors: true

- name: Build matrixMul sample
  ansible.builtin.shell: "cd {{ gpu_test_samples_dir }}/matrixMul && make"
  when: gpu_test_build
  ignore_errors: true

# Save the output to a log file so we can parse the critical information later
- name: Run p2p test
  ansible.builtin.shell: "{{ gpu_test_samples_dir }}/p2pBandwidthLatencyTest/p2pBandwidthLatencyTest | tee {{ gpu_test_samples_dir }}/p2pBandwidthLatencyTest/p2p.log"
  register: p2p
  ignore_errors: true

- name: Run matrixMul test
  ansible.builtin.shell: "{{ gpu_test_samples_dir }}/matrixMul/matrixMul -wA=4096 -hA=4096 -wB=4096 -hB=4096 | tee {{ gpu_test_samples_dir }}/matrixMul/matrixMul.log"
  register: matrixmul
  ignore_errors: true

# -r 1 for quick system validation test, 2 for medium extended validation, 3 for long HW diagnostics/stress
- name: Run dcgm diag for up to 15 minutes
  ansible.builtin.shell: "dcgmi diag -r {{ gpu_test_dcgm_level }}"
  register: dcgm
  ignore_errors: true

# Note, this may fail to run depending on Ansible settings
# We only look at the last few lines with relevant output
- name: Run TF training job for up to 5 minutes
  become: true
  ansible.builtin.shell: "docker run --runtime=nvidia --rm -t nvcr.io/nvidia/tensorflow:18.07-py3 mpiexec --allow-run-as-root --bind-to socket -np {{ gpu_count.stdout }} python /opt/tensorflow/nvidia-examples/cnn/resnet.py --layers={{ gpu_test_tf_layers }} --precision=fp16 --batch_size={{ gpu_test_tf_batch_size }} | tail -n 12"
  register: tf
  ignore_errors: true

# Look for " Bidirectional P2P=Enabled Bandwidth Matrix (GB/s)" Speed should be ~260 for gpu to gpu and ~800 within a gpu
- name: Get p2p bidirectional results
  ansible.builtin.shell: "grep 'Bidirectional P2P=Enabled Bandwidth Matrix' -A 17 {{ gpu_test_samples_dir }}/p2pBandwidthLatencyTest/p2p.log | sed 's/        1/
/g' | cut -d ' ' -f11- | tail -n {{ gpu_count.stdout }}"
  register: p2p_results
  ignore_errors: true

- name: Report on p2p test output
  ansible.builtin.debug:
    msg: "{{ p2p.stdout }}"

- name: Report on tf results
  ansible.builtin.debug:
    msg: "{{ tf.stdout }}"

- name: Report on p2p bidirectional results
  ansible.builtin.debug:
    msg: "{{ p2p_results.stdout }}"

- name: Report on matrixmul results
  ansible.builtin.debug:
    msg: "{{ matrixmul.stdout }}"

- name: Report on dcgm results
  ansible.builtin.debug:
    msg: "{{ dcgm.stdout }}"

- name: Report on GPU results
  ansible.builtin.debug:
    msg: "Found {{ gpu_count.stdout }} GPUs"
