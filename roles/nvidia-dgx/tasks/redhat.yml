---
- name: Include Red Hat DGX variables
  ansible.builtin.include_vars: redhat.yml

# Legacy EL7 (DGX-1/DGX-2 yum/python2 stack) is no longer supported and was removed.
- name: Check for a supported Red Hat family DGX Software Stack version
  ansible.builtin.fail:
    msg: "This role supports Red Hat family major versions 8, 9, and 10"
  when: ansible_distribution_major_version | int < 8

- name: Run EL8+ DGX Software Stack tasks
  ansible.builtin.include_tasks: redhat-el8-plus.yml
  when: ansible_distribution_major_version | int >= 8
