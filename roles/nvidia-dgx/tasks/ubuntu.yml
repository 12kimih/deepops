---
# DGX Software Stack by release: 22.04 = DGX OS 6, 24.04 = DGX OS 7. Ubuntu 26.04
# has no dedicated DGX OS yet, so it follows the 24.04 (DGX OS 7) task path.
# Legacy DGX OS 4/5 (Ubuntu 18.04/20.04) is no longer supported and was removed.
- name: Check for a supported Ubuntu DGX Software Stack version
  ansible.builtin.fail:
    msg: "This role supports Ubuntu 22.04, 24.04, and 26.04"
  when: ansible_distribution_version is version('22.04', '<')

- name: Run DGX OS 6 tasks (Ubuntu 22.04)
  ansible.builtin.include_tasks: ubuntu-22.04.yml
  when: ansible_distribution_version == '22.04'

- name: Run DGX OS 7 tasks (Ubuntu 24.04 and later)
  ansible.builtin.include_tasks: ubuntu-24.04.yml
  when: ansible_distribution_version is version('24.04', '>=')
