---
- name: Apt update
  apt:
    update_cache: true
  when: ansible_distribution == 'Ubuntu'

- name: Restart cachefilesd
  service:
    name: cachefilesd
    state: restarted

- name: Reboot after driver install
  reboot:
  when: install_driver.changed and not nvidia_driver_skip_reboot

- name: Restart docker
  service:
    name: docker
    state: restarted
