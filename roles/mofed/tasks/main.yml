---
# Install DOCA-OFED (the MLNX_OFED successor) from NVIDIA's DOCA network repo.
# https://docs.nvidia.com/doca/sdk/doca-host-installation-and-upgrade/index.html
- name: Include OS-specific prerequisite vars
  ansible.builtin.include_vars: "{{ lookup('first_found', _mofed_vars) }}"
  vars:
    _mofed_vars:
      files:
        - "{{ ansible_distribution | lower }}.yml"
        - "rhel{{ ansible_distribution_major_version }}.yml"
        - "rhel8.yml"
      paths:
        - vars

# --- Ubuntu: DOCA-OFED apt repository ---
- name: Ubuntu | add the DOCA repository GPG key
  ansible.builtin.get_url:
    url: "{{ mofed_repo_gpg_key }}"
    dest: /usr/share/keyrings/mellanox-doca.asc
    mode: "0644"
  register: mofed_doca_gpg_download
  until: mofed_doca_gpg_download is succeeded
  retries: 5
  delay: 10
  when: ansible_distribution == "Ubuntu"
  environment: "{{ proxy_env if proxy_env is defined else {} }}"

- name: Ubuntu | add the DOCA-OFED apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/mellanox-doca.asc] {{ mofed_repo_base_url }} ./"
    filename: mellanox-doca
    state: present
  when: ansible_distribution == "Ubuntu"

# --- RHEL/Rocky: DOCA-OFED dnf repository ---
- name: RHEL | add the DOCA-OFED dnf repository
  ansible.builtin.yum_repository:
    name: mellanox-doca
    description: NVIDIA DOCA-OFED
    baseurl: "{{ mofed_repo_base_url }}"
    gpgcheck: true
    gpgkey: "{{ mofed_repo_gpg_key }}"
  when: ansible_os_family == "RedHat"

- name: RHEL | install prerequisites
  ansible.builtin.dnf:
    name: "{{ mofed_pkg_prereqs }}"
    state: present
  when: ansible_os_family == "RedHat"

# --- Install the OFED bundle (apt/dnf state=present is idempotent) ---
- name: Install DOCA-OFED (Ubuntu)
  ansible.builtin.apt:
    name: "{{ mofed_package }}"
    state: present
    update_cache: true
  register: mofed_install_ubuntu
  when: ansible_distribution == "Ubuntu"
  environment: "{{ proxy_env if proxy_env is defined else {} }}"

- name: Install DOCA-OFED (RHEL/Rocky)
  ansible.builtin.dnf:
    name: "{{ mofed_package }}"
    state: present
  register: mofed_install_redhat
  when: ansible_os_family == "RedHat"

- name: Reboot to load the OFED kernel modules
  ansible.builtin.reboot:
    msg: "Rebooting to load DOCA-OFED kernel modules"
    reboot_timeout: "{{ mofed_reboot_timeout }}"
  when:
    - mofed_reboot | bool
    - (mofed_install_ubuntu.changed | default(false)) or (mofed_install_redhat.changed | default(false))
