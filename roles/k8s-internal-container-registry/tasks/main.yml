---
# While we would prefer to use the Ansible helm module, it's broken! :-(
# See https://github.com/ansible/ansible/pull/57897
# Unfortunately this will not be fixed until Ansible 2.10 which is not yet released.
# So for now we will run helm commands directly...

- name: Install stable helm repository
  ansible.builtin.command: "{{ helm_cmd }} repo add {{ container_registry_repo_name }} {{ container_registry_chart_location }}"
  changed_when: false

- name: Update helm repos
  ansible.builtin.command: "{{ helm_cmd }} repo update"
  changed_when: false

- name: Copy values.yaml into place
  ansible.builtin.template:
    src: "{{ container_registry_values_template }}"
    dest: "{{ container_registry_values_path }}"
    owner: "root"
    group: "root"
    mode: "0644"

- name: Install container-registry
  ansible.builtin.command: "{{ helm_cmd }} upgrade --install -f {{ container_registry_values_path }} --version {{ container_registry_version }} --create-namespace
    --namespace {{ container_registry_namespace }} {{ container_registry_installed_name }} {{ container_registry_chart_name }}"
  changed_when: false
