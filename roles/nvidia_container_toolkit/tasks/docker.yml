---
- name: Docker | ensure Docker configuration directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Docker | ensure the docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  when: nvidia_container_toolkit_enable_docker | bool

# NGC/NCCL workloads run via bare `docker run` need a larger /dev/shm and unlimited
# memlock (pinned GPU memory) + a large stack; docker's 64 MiB shm default breaks
# multi-GPU NCCL. Merge these daemon-wide defaults BEFORE nvidia-ctk writes its
# runtime block (nvidia-ctk merges into the existing daemon.json, preserving these).
# Idempotent: only writes + reports changed when a key actually differs.
# https://docs.nvidia.com/deeplearning/frameworks/user-guide/
- name: Docker | apply daemon defaults for NGC/NCCL workloads (shm-size + ulimits)
  ansible.builtin.command:
    cmd: >-
      python3 -c 'import json, pathlib, sys;
      p = pathlib.Path("/etc/docker/daemon.json");
      tuning = {{ nvidia_container_toolkit_docker_tuning | to_json }};
      text = p.read_text().strip() if p.exists() else "";
      data = json.loads(text) if text else {};
      changed = any(data.get(k) != v for k, v in tuning.items());
      data.update(tuning);
      (p.write_text(json.dumps(data, indent=2) + chr(10)) if changed else None);
      sys.exit(10 if changed else 0)'
  register: nvidia_container_toolkit_docker_tuning_result
  changed_when: nvidia_container_toolkit_docker_tuning_result.rc == 10
  failed_when: nvidia_container_toolkit_docker_tuning_result.rc not in [0, 10]
  when: nvidia_container_toolkit_set_docker_tuning | bool
  notify: Restart docker

- name: Docker | check NVIDIA runtime configuration
  ansible.builtin.command:
    cmd: >-
      python3 -c 'import json, pathlib, sys;
      p = pathlib.Path("/etc/docker/daemon.json");
      required_default = {{ nvidia_container_toolkit_set_as_default_runtime | bool | ternary("True", "False") }};
      data = {};
      text = p.read_text().strip() if p.exists() else "";
      data = json.loads(text) if text else {};
      runtime = data.get("runtimes", {}).get("nvidia", {});
      ok = runtime.get("path") in ("nvidia-container-runtime", "/usr/bin/nvidia-container-runtime");
      ok = ok and (not required_default or data.get("default-runtime") == "nvidia");
      sys.exit(0 if ok else 1)'
  register: nvidia_container_toolkit_docker_runtime
  failed_when: false
  changed_when: false

- name: Docker | configure NVIDIA runtime
  ansible.builtin.command:
    cmd: "nvidia-ctk runtime configure --runtime=docker{{ ' --set-as-default' if nvidia_container_toolkit_set_as_default_runtime | bool else '' }}"
  when: nvidia_container_toolkit_docker_runtime.rc != 0
  changed_when: true
  notify: Restart docker
