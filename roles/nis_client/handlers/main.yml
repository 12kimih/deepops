---
# The NIS client service is named "nis" on modern Debian/Ubuntu (22.04/24.04/
# 26.04) and on the RedHat family here, so a single handler covers both. The old
# handler was gated to Ubuntu 14.04 (ypbind) and never fired on current Ubuntu,
# leaving config changes unapplied.
- name: Restart nis
  ansible.builtin.service:
    name: nis
    state: restarted
    enabled: true
