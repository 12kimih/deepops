---
# The NIS client daemon is ypbind.service on BOTH families: ypbind-mt on Debian/
# Ubuntu (there is no nis.service since Debian bullseye / Ubuntu 20.04) and ypbind on
# the RHEL family. https://wiki.debian.org/BullseyeNis
- name: Restart nis
  ansible.builtin.service:
    name: ypbind
    state: restarted
    enabled: true
