---
- name: Restart nis
  ansible.builtin.service: name=ypbind state=restarted enabled=yes
  when: (ansible_os_family == "Debian" and ansible_distribution_version in [ "14.04" ])

- name: Restart nis
  ansible.builtin.service: name=nis state=restarted enabled=yes
  when: ansible_os_family == "RedHat"
