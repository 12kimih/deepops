---
- name: Assert that variables are defined
  ansible.builtin.fail:
    msg: "Variable '{{ item }}' is not defined"
  when: item not in vars
  with_items:
    - nis_domain
    - nis_server

- name: Prevent daemons from starting when installing packages, particularly ypbind
  ansible.builtin.copy:
    src: policy-rc.d
    dest: /usr/sbin/policy-rc.d
    owner: root
    group: root
    mode: "0700"
  changed_when: false

# Install the CLIENT packages directly, not the `nis` meta-package: on Ubuntu 20.04+
# / Debian 11+ `nis` pulls in ypserv (the NIS *server*) too, which a client must not
# run. ypbind-mt provides the ypbind.service client daemon; yp-tools gives ypwhich/ypcat.
# https://wiki.debian.org/BullseyeNis
- name: Install Debian/Ubuntu NIS client packages
  ansible.builtin.apt:
    name: [ypbind-mt, yp-tools, rpcbind]
    state: present
  when: ansible_os_family == "Debian"

- name: Install CentOS NIS packages
  ansible.builtin.dnf: name=ypbind state=present
  when: ansible_os_family == "RedHat"

- name: Ensure rpcbind is running
  ansible.builtin.service: name=rpcbind state=started enabled=true

- name: Set server
  ansible.builtin.lineinfile:
    dest: /etc/yp.conf
    regexp: "^domain"
    line: "domain {{ nis_domain }} server {{ nis_server }}"
  notify: "Restart nis"

# /etc/defaultdomain holds exactly the NIS domain. The old lineinfile used
# regexp "^" (matches the start of EVERY line) which clobbers line 1 of any
# multi-line file; a single-value copy is both correct and idempotent.
- name: Configure the NIS domain name
  ansible.builtin.copy:
    dest: /etc/defaultdomain
    content: "{{ nis_domain }}\n"
    owner: root
    group: root
    mode: "0644"
  notify: "Restart nis"

- name: Configure nsswitch.conf
  ansible.builtin.lineinfile:
    dest: /etc/nsswitch.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  with_items:
    - { regexp: "^passwd", line: "passwd: files nis" }
    - { regexp: "^group", line: "group: files nis" }
    - { regexp: "^shadow", line: "shadow: files nis" }
    - { regexp: "^automount", line: "automount: files nis" }
  notify: "Restart nis"

- name: Make sure rpcbind is running
  ansible.builtin.service: name=rpcbind state=started enabled=true

# The NIS client daemon is ypbind.service on BOTH families: ypbind-mt on Debian/
# Ubuntu (there is no nis.service since Debian bullseye / Ubuntu 20.04) and ypbind on
# the RHEL family. ypbind will not bind without a reachable NIS server, so the start
# is skipped under molecule (no server in the container).
# https://wiki.debian.org/BullseyeNis
- name: Make sure the NIS client (ypbind) is running
  ansible.builtin.service:
    name: ypbind
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - molecule-notest

- name: Remove file to prevent starting services at install time
  ansible.builtin.file:
    path: /usr/sbin/policy-rc.d
    state: absent
  changed_when: false
