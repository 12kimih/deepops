---
# RHEL/Rocky: install the driver from NVIDIA's cuda-rhel repository using dnf
# module streams. The "-open" stream + the nvidia-open meta installs the open
# kernel modules; "-dkms" + cuda-drivers installs the proprietary modules.
# https://docs.nvidia.com/datacenter/tesla/driver-installation-guide/red-hat-enterprise-linux.html
- name: Determine the NVIDIA driver module stream and package (RHEL/Rocky)
  ansible.builtin.set_fact:
    nvidia_driver_rhel_stream_resolved: >-
      {{ nvidia_driver_rhel_module_stream if (nvidia_driver_rhel_module_stream | default('') | length > 0)
         else 'nvidia-driver:' ~ nvidia_driver_branch
              ~ ('-open' if (nvidia_driver_kernel_modules == 'open') else '-dkms') }}
    nvidia_driver_rhel_package_resolved: >-
      {{ nvidia_driver_rhel_package if (nvidia_driver_rhel_package | default('') | length > 0)
         else ('nvidia-open' if (nvidia_driver_kernel_modules == 'open') else 'cuda-drivers') }}

- name: Add the NVIDIA CUDA repository (RHEL/Rocky)
  ansible.builtin.get_url:
    url: "https://developer.download.nvidia.com/compute/cuda/repos/rhel{{ ansible_distribution_major_version }}/{{ nvidia_driver_rhel_arch }}/cuda-rhel{{ ansible_distribution_major_version
      }}.repo"
    dest: "/etc/yum.repos.d/cuda-rhel{{ ansible_distribution_major_version }}.repo"
    mode: "0644"

# CodeReady Builder / CRB provides build deps (e.g. dkms). On Rocky/Alma this is
# enabled with dnf config-manager; on RHEL proper it is the codeready-builder
# repo enabled via subscription-manager (override nvidia_driver_rhel_crb_repo).
- name: Enable the CodeReady Builder (CRB) repository (RHEL/Rocky)
  ansible.builtin.command:
    cmd: "dnf config-manager --set-enabled {{ nvidia_driver_rhel_crb_repo }}"
  changed_when: false

# Per the official guide, kernel-devel is pinned to the running kernel while
# kernel-headers is the unversioned arch package (a single version that tracks
# the userspace ABI, not the running kernel). Pinning kernel-headers to
# ansible_kernel can fail to resolve when no matching version is published.
# https://docs.nvidia.com/datacenter/tesla/driver-installation-guide/red-hat-enterprise-linux.html
- name: Install matching kernel headers and development packages (RHEL/Rocky)
  ansible.builtin.dnf:
    name:
      - "kernel-devel-{{ ansible_kernel }}"
      - "kernel-headers"
    state: present

# Gather installed packages so the purge can be skipped when the target driver is
# already present. Without this guard the find/purge below would match the driver
# this role just installed and remove it on every re-run, forcing a reboot loop.
- name: Gather installed package facts (RHEL/Rocky)
  ansible.builtin.package_facts:
    manager: rpm
  when: nvidia_driver_purge_existing | bool

- name: Find pre-existing NVIDIA driver packages (RHEL/Rocky)
  ansible.builtin.shell:
    cmd: >-
      rpm -qa --qf '%{NAME}\n' 'nvidia-*' 'kmod-nvidia-*' 'cuda-drivers*' 2>/dev/null
      | grep -vE 'container' || true
  register: nvidia_driver_existing_packages
  changed_when: false
  check_mode: false
  when:
    - nvidia_driver_purge_existing | bool
    - (nvidia_driver_rhel_package_resolved | trim) not in ansible_facts.packages

- name: Purge pre-existing NVIDIA driver packages (RHEL/Rocky)
  ansible.builtin.dnf:
    name: "{{ nvidia_driver_existing_packages.stdout_lines }}"
    state: absent
    autoremove: true
  when:
    - nvidia_driver_purge_existing | bool
    - nvidia_driver_existing_packages.stdout_lines is defined
    - nvidia_driver_existing_packages.stdout_lines | default([]) | length > 0

- name: Reset the NVIDIA driver dnf module (RHEL/Rocky)
  ansible.builtin.command:
    cmd: "dnf -y module reset nvidia-driver"
  changed_when: false
  when:
    - nvidia_driver_purge_existing | bool
    - (nvidia_driver_rhel_package_resolved | trim) not in ansible_facts.packages

- name: Enable the NVIDIA driver dnf module stream (RHEL/Rocky)
  ansible.builtin.command:
    cmd: "dnf -y module enable {{ nvidia_driver_rhel_stream_resolved }}"
  changed_when: false

- name: Install the NVIDIA driver (RHEL/Rocky)
  ansible.builtin.dnf:
    name: "{{ nvidia_driver_rhel_package_resolved }}"
    state: present
  register: nvidia_driver_install

# Fabric Manager (opt-in, NVSwitch HGX), branch-matched to the driver.
# https://docs.nvidia.com/datacenter/tesla/fabric-manager-user-guide/index.html
- name: Install NVIDIA Fabric Manager and NSCQ (RHEL/Rocky)
  ansible.builtin.dnf:
    name:
      - "nvidia-fabricmanager-{{ nvidia_driver_branch }}"
      - "libnvidia-nscq-{{ nvidia_driver_branch }}"
    state: present
  when: nvidia_driver_fabricmanager | bool
