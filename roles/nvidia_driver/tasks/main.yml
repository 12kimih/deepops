---
- name: Install the NVIDIA driver (Ubuntu)
  ansible.builtin.include_tasks: ubuntu.yml
  when: ansible_distribution == 'Ubuntu'

- name: Install the NVIDIA driver (RHEL/Rocky)
  ansible.builtin.include_tasks: redhat.yml
  when: ansible_os_family == 'RedHat'

- name: Reboot to load the new NVIDIA kernel module
  ansible.builtin.reboot:
    msg: "Rebooting to load the new NVIDIA driver"
    reboot_timeout: "{{ nvidia_driver_reboot_timeout }}"
  when:
    - nvidia_driver_reboot | bool
    - nvidia_driver_install is defined
    - nvidia_driver_install.changed

- name: Verify the NVIDIA driver with nvidia-smi
  ansible.builtin.command: nvidia-smi
  changed_when: false
  when: nvidia_driver_verify | bool
