---
- name: Install the NVIDIA driver (Ubuntu)
  ansible.builtin.include_tasks: ubuntu.yml
  when: ansible_distribution == 'Ubuntu'

- name: Install the NVIDIA driver (RHEL/Rocky)
  ansible.builtin.include_tasks: redhat.yml
  when: ansible_os_family == 'RedHat'

# A reboot is needed when this run installed/upgraded the driver, OR when the kernel
# module currently RUNNING does not match the one now ON DISK. The second case is the
# important one for re-runs: once the package is installed, a later run's apt task reports
# no change (changed=false), so gating the reboot on install.changed ALONE would never
# re-fire it -- a node whose earlier reboot was skipped or interrupted then stays stuck on
# the old module and nvidia-persistenced fails with a version mismatch. Comparing the
# loaded vs on-disk module versions catches that pending reboot on every run.
- name: Read the running NVIDIA kernel module version
  ansible.builtin.command: cat /proc/driver/nvidia/version
  register: nvidia_driver_loaded_version
  changed_when: false
  failed_when: false
  check_mode: false

- name: Read the on-disk NVIDIA kernel module version
  ansible.builtin.command: modinfo -F version nvidia
  register: nvidia_driver_ondisk_version
  changed_when: false
  failed_when: false
  check_mode: false

- name: Determine whether the NVIDIA driver needs a reboot
  ansible.builtin.set_fact:
    nvidia_driver_reboot_needed: >-
      {{ (nvidia_driver_install is defined and nvidia_driver_install.changed) or
         ((nvidia_driver_ondisk_version.stdout | default('') | trim) | length > 0 and
          (nvidia_driver_ondisk_version.stdout | trim)
            not in (nvidia_driver_loaded_version.stdout | default(''))) }}

- name: Reboot to load the new NVIDIA kernel module
  ansible.builtin.reboot:
    msg: "Rebooting to load the new NVIDIA driver"
    reboot_timeout: "{{ nvidia_driver_reboot_timeout }}"
  when:
    - nvidia_driver_reboot | bool
    - nvidia_driver_reboot_needed | bool

# Post-installation actions, run after the reboot so the new module is loaded.
# https://docs.nvidia.com/datacenter/tesla/driver-installation-guide/post-installation-actions.html

# Re-read the loaded version AFTER the possible reboot and confirm it now matches the
# on-disk module. Persistence/verify run only when the module is genuinely loaded and
# current, so a still-pending reboot (nvidia_driver_reboot=false, or a module that fails
# to load) skips them with a clear warning instead of a cryptic systemd failure.
- name: Re-read the running NVIDIA kernel module version (after any reboot)
  ansible.builtin.command: cat /proc/driver/nvidia/version
  register: nvidia_driver_loaded_version_post
  changed_when: false
  failed_when: false
  check_mode: false

- name: Determine whether the NVIDIA kernel module is loaded and current
  ansible.builtin.set_fact:
    nvidia_driver_module_loaded: >-
      {{ (nvidia_driver_ondisk_version.stdout | default('') | trim) | length > 0 and
         (nvidia_driver_ondisk_version.stdout | trim)
           in (nvidia_driver_loaded_version_post.stdout | default('')) }}

- name: Warn that a manual reboot is needed (NVIDIA module not loaded/current)
  ansible.builtin.debug:
    msg: >-
      The on-disk NVIDIA module ({{ nvidia_driver_ondisk_version.stdout | default('?') | trim }})
      is not the one running on {{ inventory_hostname }}. Reboot it (or set
      nvidia_driver_reboot=true) so the new driver loads; skipping persistence/verify.
  when:
    - (nvidia_driver_ondisk_version.stdout | default('') | trim) | length > 0
    - not (nvidia_driver_module_loaded | bool)

# NVIDIA recommends the persistence daemon over the legacy `nvidia-smi -pm 1`
# ("the daemon approach provides a more elegant and robust solution"; legacy
# persistence mode is slated for deprecation). The driver packages pull in
# nvidia-persistenced with an enable preset; enable it explicitly to be deterministic.
- name: Enable the NVIDIA persistence daemon
  ansible.builtin.systemd:
    name: nvidia-persistenced
    enabled: true
    state: started
  when:
    - nvidia_driver_persistenced | bool
    - nvidia_driver_module_loaded | bool

# Optional drop-in (opt-in): force --persistence-mode and/or add --verbose. The
# empty ExecStart= reset is required because ExecStart is a systemd list directive.
- name: Create the nvidia-persistenced systemd drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/nvidia-persistenced.service.d
    state: directory
    mode: "0755"
  when:
    - nvidia_driver_persistenced | bool
    - nvidia_driver_persistenced_dropin | bool
    - nvidia_driver_module_loaded | bool

- name: Deploy the nvidia-persistenced systemd drop-in
  ansible.builtin.copy:
    dest: /etc/systemd/system/nvidia-persistenced.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/bin/nvidia-persistenced --user nvidia-persistenced --persistence-mode --verbose
  notify: Reload systemd and restart nvidia-persistenced
  when:
    - nvidia_driver_persistenced | bool
    - nvidia_driver_persistenced_dropin | bool
    - nvidia_driver_module_loaded | bool

# NVSwitch HGX baseboards require Fabric Manager, branch-matched to the driver.
# https://docs.nvidia.com/datacenter/tesla/fabric-manager-user-guide/index.html
- name: Enable NVIDIA Fabric Manager
  ansible.builtin.systemd:
    name: nvidia-fabricmanager
    enabled: true
    state: started
  when:
    - nvidia_driver_fabricmanager | bool
    - nvidia_driver_module_loaded | bool

- name: Verify the loaded NVIDIA driver version
  ansible.builtin.command: cat /proc/driver/nvidia/version
  changed_when: false
  when:
    - nvidia_driver_verify | bool
    - nvidia_driver_module_loaded | bool

- name: Verify GPUs are visible with nvidia-smi
  ansible.builtin.command: nvidia-smi
  changed_when: false
  when:
    - nvidia_driver_verify | bool
    - nvidia_driver_module_loaded | bool
