---
- name: Update-initramfs (Debian)
  ansible.builtin.command: update-initramfs -u
  when: ansible_os_family == "Debian"
  listen: update-initramfs

- name: Backup initramfs (RedHat)
  ansible.builtin.shell: mv /boot/initramfs-$(uname -r).img /boot/initramfs-$(uname -r).img.bak
  when: ansible_os_family == "RedHat"
  listen: update-initramfs

- name: Update-initramfs (RedHat)
  ansible.builtin.shell: dracut /boot/initramfs-$(uname -r).img $(uname -r)
  when: ansible_os_family == "RedHat"
  listen: update-initramfs
