---
- name: Install dependencies (Ubuntu)
  ansible.builtin.apt:
    name:
      - "uidmap"
    state: present
  when: ansible_distribution == "Ubuntu"

- name: Install dependencies (Red Hat)
  ansible.builtin.dnf:
    name:
      - "shadow-utils"
      - "fuse-overlayfs"
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure directory structure exists
  ansible.builtin.file:
    path: "{{ rootlessdocker_install_dir }}/{{ item.path }}"
    owner: "root"
    group: "root"
    state: directory
    mode: "0755"
  with_filetree: "{{ role_path }}/templates/rootless-docker"
  when: item.state == 'directory'

- name: Copy over templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ rootlessdocker_install_dir }}/{{ item.path }}"
    owner: "root"
    group: "root"
    mode: "{{ item.mode }}"
    force: false
  with_filetree: "{{ role_path }}/templates/rootless-docker"
  when: item.state == 'file'

- name: Register the rootless docker modulefiles tree with Lmod (sorts before z00_lmod)
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/profile.d/{{ item }}"
    owner: "root"
    group: "root"
    mode: "0644"
  with_items:
    - "00-rootlessdocker-modulepath.sh"
    - "00-rootlessdocker-modulepath.csh"

- name: Remove the superseded z96 rootless docker modulepath snippet
  ansible.builtin.file:
    path: "/etc/profile.d/z96_rootlessdocker_modules.sh"
    state: absent

- name: Check if rootless docker already installed successfully
  ansible.builtin.stat:
    path: "{{ rootlessdocker_install_dir }}/config/install_success"
  register: rootless_docker_installed

- name: Template setup rootless docker script
  ansible.builtin.template:
    src: "{{ role_path }}/templates/rootless_docker_setup.sh.j2"
    dest: /tmp/rootless_docker_setup.sh
    mode: "0755"
  when: not rootless_docker_installed.stat.exists

- name: Execute setup rootless docker script
  become: true
  ansible.builtin.command: /tmp/rootless_docker_setup.sh
  args:
    executable: /bin/bash
    creates: "{{ rootlessdocker_install_dir }}/config/install_success"

- name: Clean up rootless docker set script
  ansible.builtin.file:
    path: /tmp/rootless_docker_setup.sh
    state: absent

- name: Add the br_netfilter module
  community.general.modprobe:
    name: br_netfilter
    state: present

- name: Load br_netfilter module at boot
  # /etc/modules-load.d/*.conf is read by systemd-modules-load on both
  # Debian/Ubuntu and the RHEL family (RHEL does not read /etc/modules), so the
  # module persists across reboot on every supported OS.
  ansible.builtin.copy:
    dest: /etc/modules-load.d/br_netfilter.conf
    content: "br_netfilter\n"
    owner: "root"
    group: "root"
    mode: "0644"
