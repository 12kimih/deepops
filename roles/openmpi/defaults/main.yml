---
# OpenMPI built from source for the Slurm cluster. 5.0.x is the current stable
# series (5.0.10, Feb 2026); 4.0.x is EOL. Must move in step with pmix_version
# because OpenMPI compiles against the PMIx headers (5.0.x needs PMIx >= 4.2.0).
openmpi_version: 5.0.10
openmpi_tag: "v{{ openmpi_version.split('.')[0] }}.{{ openmpi_version.split('.')[1] }}"
openmpi_src_url: "https://download.open-mpi.org/release/open-mpi/{{ openmpi_tag }}/openmpi-{{ openmpi_version }}.tar.bz2"
openmpi_build_dir: /tmp/openmpi-build
openmpi_install_prefix: /usr/local
# Default builds OpenMPI's bundled (internal) PMIx. On 5.0.x that bundled PMIx is
# 5.x -- the SAME major Slurm links (pmix_version 5.0.10) -- so they are
# wire-compatible with no cross-version risk, and it builds anywhere without a
# prebuilt external PMIx. For the tightest coupling you can instead build against
# the SAME external PMIx + hwloc Slurm uses (SchedMD best practice); config.example
# ships that override. Note v5 removed --with-pmi/--with-slurm; `srun --mpi=pmix`
# needs only PMIx. https://slurm.schedmd.com/mpi_guide.html
openmpi_configure: "./configure --prefix={{ openmpi_install_prefix }} --disable-dependency-tracking --disable-getpwuid --with-pmix=internal"
openmpi_force_rebuild: false
