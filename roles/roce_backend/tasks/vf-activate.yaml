---
- name: Check activation
  register: result
  ansible.builtin.command: "grep -i {{ item.pf_name }} /etc/rc.local"
  failed_when: result.rc == 2
  changed_when: result.rc == 1
  tags: roce_host

- name: VF activation
  ansible.builtin.shell: |
    echo {{ num_vf | int }} > /sys/class/net/{{ item.pf_name }}/device/sriov_numvfs
  args:
    executable: /bin/bash
    warn: false
  when: result.rc > 0
  tags: roce_host

- name: VF activation update (remove)
  ansible.builtin.lineinfile:
    path: /etc/rc.local
    regexp: "^{{ item.pf_name }}"
    state: absent
  when: result.rc == 0
  tags: roce_host

- name: For persistant VF activation
  ansible.builtin.lineinfile:
    path: /etc/rc.local
    line: "echo {{ num_vf | int }} > /sys/class/net/{{ item.pf_name }}/device/sriov_numvfs"
    insertbefore: "^exit 0"
  tags: roce_host
