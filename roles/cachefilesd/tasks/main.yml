---
- name: Install
  ansible.builtin.package:
    name: cachefilesd
    state: "{{ cachefilesd_package_state }}"

- name: Enable
  ansible.builtin.template:
    src: cachefilesd.j2
    dest: /etc/default/cachefilesd
    owner: "root"
    group: "root"
    mode: "0644"
  notify: Restart cachefilesd

- name: Configure
  ansible.builtin.template:
    src: cachefilesd_config.j2
    dest: /etc/cachefilesd.conf
    owner: "root"
    group: "root"
    mode: "0644"
  notify: Restart cachefilesd

# state: started (not restarted) so re-runs with no config change are no-ops; the
# Restart cachefilesd handler bounces it only when /etc/default or the conf change.
# Not tested in molecule as cachefilesd requires a kernel module.
- name: Start
  ansible.builtin.service:
    name: cachefilesd
    state: started
    enabled: true
  tags:
    - molecule-notest
