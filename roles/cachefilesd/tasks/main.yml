---
- name: Install
  ansible.builtin.package:
    name: cachefilesd
    state: "{{ cachefilesd_package_state }}"

- name: Enable
  ansible.builtin.template:
    src: cachefilesd.j2
    dest: /etc/default/cachefilesd
    owner: "root"
    group: "root"
    mode: "0644"
  register: cachefilesd_default

- name: Configure
  ansible.builtin.template:
    src: cachefilesd_config.j2
    dest: /etc/cachefilesd.conf
    owner: "root"
    group: "root"
    mode: "0644"
  register: cachefilesd_conf

# The service tasks are skipped in molecule (cachefilesd needs a kernel module the
# container lacks) via molecule-notest -- which reliably skips TASKS, unlike a
# notified handler. state: started makes an unchanged re-run a no-op, and the
# restart fires only when the config above changed, so re-runs don't bounce the
# daemon.
- name: Start
  ansible.builtin.service:
    name: cachefilesd
    state: started
    enabled: true
  tags:
    - molecule-notest

- name: Restart cachefilesd to apply config changes
  ansible.builtin.service:
    name: cachefilesd
    state: restarted
  when: cachefilesd_default is changed or cachefilesd_conf is changed
  tags:
    - molecule-notest
