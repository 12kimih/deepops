---
epel_package: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
epel_key_url: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"

deepops_dir: /opt/deepops
slurm_build_dir: /opt/deepops/build/slurm
hwloc_build_dir: /opt/deepops/build/hwloc
pmix_build_dir: /opt/deepops/build/pmix

slurm_workflow_build: true
slurm_version: "25.11.6"
slurm_src_url: "https://download.schedmd.com/slurm/slurm-{{ slurm_version }}.tar.bz2"
slurm_build_make_clean: false
slurm_build_dir_cleanup: false
slurm_config_dir: /etc/slurm
# Only used when slurm_conf_symlink is true (slurm.conf shared via NFS). Defaults to
# the local config dir; set this to a path NFS-shared to all nodes (e.g. /sw/.slurm)
# in config/group_vars/slurm-cluster.yml when you enable the symlink.
slurmctl_config_dir: "{{ slurm_config_dir }}"
slurm_sysconf_dir: /etc/sysconfig
slurm_install_prefix: /usr/local
slurm_cuda_prefix: /usr/local/cuda
slurm_configure: "./configure --prefix={{ slurm_install_prefix }} --disable-dependency-tracking --disable-debug --disable-x11 --enable-really-no-cray --enable-salloc-kill-cmd
  --with-hdf5=no --sysconfdir={{ slurm_config_dir }} --enable-pam --with-pam_dir={{ slurm_pam_lib_dir }} --with-shared-libslurm --without-rpath --with-pmix={{ pmix_install_prefix
  }} --with-hwloc={{ hwloc_install_prefix }}"
slurm_configure_nvml: "./configure --prefix={{ slurm_install_prefix }} --disable-dependency-tracking --disable-debug --disable-x11 --enable-really-no-cray --enable-salloc-kill-cmd
  --with-hdf5=no --sysconfdir={{ slurm_config_dir }} --enable-pam --with-pam_dir={{ slurm_pam_lib_dir }} --with-shared-libslurm --without-rpath --with-pmix={{ pmix_install_prefix
  }} --with-hwloc={{ hwloc_install_prefix }} --with-nvml={{ slurm_cuda_prefix }}"
slurm_force_rebuild: false
slurm_contain_ssh: true

slurm_cluster_name: deepops
slurm_username: slurm
slurm_password: ReplaceWithASecurePasswordInTheVault
slurm_user_uid: 22078
slurm_user_home: /local/slurm

slurm_allow_ssh_user: []
slurm_db_username: slurm
slurm_db_password: AlsoReplaceWithASecurePasswordInTheVault

# sacctmgr accounting account new users are added to, and its Organization label.
slurm_acct_account: compute-account
slurm_acct_organization: deepops

slurm_enable_ha: false
# HA StateSaveLocation. Must be on storage shared by all controllers when HA is on;
# set it to your shared path (e.g. /sw/slurm) in config/group_vars.
slurm_ha_state_save_location: "{{ deepops_dir }}/slurm/state"

is_controller: false
is_compute: false

# Controls when a DOWN node will be returned to service. 2 lets nodes auto-recover
# after a clean RebootProgram cycle (driver/firmware updates); 1 leaves them DOWN
# on an unexpected reboot until manual review.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_2_1
slurm_return_to_service: 2
slurm_reboot_program: "/bin/systemctl reboot"
slurm_resume_timeout: 900

# Sets: GresTypes=gpu
# Sets: Gres=gpu:{{ gpu_topology|count }}
slurm_manage_gpus: true
slurm_autodetect_nvml: true

# Configuration file templates to use for configuring Slurm.
# The default values are relative paths that will point to files within the
# templates/ directory of this role, but we provide variables so that they
# can be overridden.
slurm_conf_template: "etc/slurm/slurm.conf"
slurm_cgroup_conf_template: "etc/slurm/cgroup.conf"
slurm_gres_conf_template: "etc/slurm/gres.conf"
slurm_dbd_conf_template: "etc/slurm/slurmdbd.conf"
slurm_job_submit_template: "etc/slurm/job_submit.lua"

# --- Server-specific overrides (set these in config/group_vars/slurm-cluster.yml) ---
# Literal lines that replace the auto-detected node/partition/gres sections, so a
# site can hand-tune hardware without editing the role. Empty = auto-generate.
# For TOTAL control, point slurm_conf_template (above) at your own template file.
slurm_nodes_raw: []        # literal NodeName= lines (override CPU/GPU auto-detect)
slurm_partitions_raw: []   # literal PartitionName= lines (replace the batch default)
slurm_gres_raw: []         # literal gres.conf lines (per-NodeName AutoDetect/Type/MIG/MPS)

# --- slurm.conf tunables (best-practice defaults for an AI/ML GPU cluster) ---
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html
slurm_select_type_parameters: "CR_Core_Memory,CR_CORE_DEFAULT_DIST_BLOCK"
# Empty by default so a fresh cluster runs before sacctmgr associations/QOS exist.
# Once accounts/QOS are set up, set "associations,limits,qos,safe" to enforce them.
slurm_accounting_enforce: ""
slurm_accounting_tres: "gres/gpu"   # add gres/gpu:<type> entries for mixed fleets
slurm_scheduler_parameters: "bf_continue,bf_window=4320,bf_resolution=120,bf_max_job_test=1000,default_queue_depth=500,bf_busy_nodes"
slurm_health_check_node_state: "IDLE"
slurm_default_mem_per_cpu: 0        # 0 = unlimited; set a value to bound --mem-less jobs
# slurm_default_cpu_per_gpu: 8      # CPUs per GPU for GPU-only requests (optional)
# slurm_prolog_flags: "Contain"    # override the computed PrologFlags (optional)

# Multifactor priority + fairshare (inert until weights are non-zero).
slurm_enable_fairshare: true
slurm_priority_decay_halflife: "7-0"
slurm_priority_weight_fairshare: 100000
slurm_priority_weight_age: 1000
slurm_priority_weight_qos: 10000
slurm_priority_weight_partition: 10000
slurm_priority_weight_tres: "GRES/gpu=1000"

# QOS preemption (REQUEUE frees GPUs cleanly). Off by default.
slurm_enable_preempt: false
slurm_preempt_type: "preempt/qos"
slurm_preempt_mode: "REQUEUE"

# Optional plugins (empty = disabled). "lua" deploys job_submit.lua;
# "topology/tree" needs a topology.conf.
slurm_job_submit_plugins: ""
slurm_topology_plugin: ""

# Build the slurmrestd REST API (pulls extra dev headers; off by default).
slurm_build_slurmrestd: false

# Flags for sharing slurm.conf among compute and control nodes
slurm_conf_symlink: false

# Controls the ability of the partition to execute more than one job at a time on each resource (node, socket or core depending upon the value of SelectTypeParameters). If resources are to be over-subscribed, avoiding memory over-subscription is very important. SelectTypeParameters should be configured to treat memory as a consumable resource and the --mem option should be used for job allocations. Sharing of resources is typically useful only when using gang scheduling (PreemptMode=suspend,gang). Possible values for OverSubscribe are "EXCLUSIVE", "FORCE", "YES", and "NO". Note that a value of "YES" or "FORCE" can negatively impact performance for systems with many thousands of running jobs. The default value is "NO". For more information see the following web pages:
# Sets partition OverSubscribe
# To avoid sharing nodes, set to "EXCLUSIVE"
slurm_oversubscribe: "NO"

# Maximum run time limit for jobs. Format is minutes, minutes:seconds, hours:minutes:seconds, days-hours, days-hours:minutes, days-hours:minutes:seconds or "UNLIMITED". Time resolution is one minute and second values are rounded up to the next minute. This limit does not apply to jobs executed by SlurmUser or user root.
# Sets: MaxTime={{ slurm_max_job_timelimit }}
# Default: INFINITE
# slurm_max_job_timelimit: INFINITE

# Run time limit used for jobs that don't specify a value. If not set then MaxTime will be used. Format is the same as for MaxTime.
# Sets: DefaultTime={{ slurm_default_job_timelimit }}
# Default: <not included>
# slurm_default_job_timelimit:

# Maximum time to wait for Slurm compute nodes to reboot during playbook setup
slurm_node_reboot_timeout: 600

# Set up prolog and epilog
slurm_enable_prolog_epilog: true

# Useful to delete old files (e.g. from previous versions of deepops)
slurm_clear_old_prolog_epilog: false

# Fileglob patterns used to copy prolog and epilog files
prolog_fileglob:
  - "templates/etc/slurm/prolog.d/*"
epilog_fileglob:
  - "templates/etc/slurm/epilog.d/*"

# Disable clearing of shared memory when user login shell exits
slurm_fix_shm: true

# Configure pam_slurm_adopt to adopt processes from user SSH into a job cgroup
slurm_enable_pam_slurm_adopt: true
# Restrict user SSH access to only allow users with a running job
slurm_restrict_node_access: true

slurm_include_hwloc: true
hwloc_version: 2.12.2
hwloc_tag: "v{{ hwloc_version.split('.')[0] }}.{{ hwloc_version.split('.')[1] }}"
hwloc_src_url: "https://download.open-mpi.org/release/hwloc/{{ hwloc_tag }}/hwloc-{{ hwloc_version }}.tar.gz"
hwloc_install_prefix: /opt/deepops/hwloc
hwloc_configure: "./configure --prefix={{ hwloc_install_prefix }} --enable-static --disable-cairo --disable-libxml2 --enable-netloc --enable-plugins"
hwloc_force_rebuild: false

slurm_include_pmix: true
# PMIx is built from source and linked into Slurm (--with-pmix) and, optionally,
# OpenMPI. 5.0.x is the current stable OpenPMIx series (5.0.10, Jan 2026); Slurm
# 22.05+ supports PMIx v2-v5, so 25.11 links 5.0.x cleanly. Keep this in step
# with openmpi_version -- OpenMPI compiles against these PMIx headers when built
# --with-pmix=<prefix>. libevent (a PMIx build dep) comes from slurm_pmix_deps;
# hwloc is the role-built one below.
# https://slurm.schedmd.com/mpi_guide.html  https://openpmix.org/downloads.html
pmix_version: 5.0.10
pmix_src_url: "https://github.com/openpmix/openpmix/releases/download/v{{ pmix_version }}/pmix-{{ pmix_version }}.tar.bz2"
pmix_install_prefix: /opt/deepops/pmix
pmix_configure: "./configure --prefix={{ pmix_install_prefix }} --with-hwloc={{ hwloc_install_prefix }}"
pmix_force_rebuild: false
