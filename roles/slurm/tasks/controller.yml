---
- name: Install dependencies (Debian)
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  with_items:
    - mariadb-server
    - python3-pymysql
    - s-nail
    - ssmtp
  when: ansible_os_family == "Debian"

- name: Install dependencies (RedHat)
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  with_items:
    - mariadb-server
    - python3-PyMySQL
    - mailx
    - policycoreutils-python-utils
  when: ansible_os_family == "RedHat"

- name: Allow mysql to read libaio.so.1
  community.general.sefcontext:
    target: "/lib64(/.*)?"
    setype: mysqld_db_t
    state: present
  when:
    - ansible_os_family == "RedHat"
    - (ansible_selinux is defined) and (ansible_selinux.status != "disabled")

- name: Apply new SELinux file context to filesystem
  ansible.builtin.command: restorecon -irv /lib64
  when:
    - ansible_os_family == "RedHat"
    - (ansible_selinux is defined) and (ansible_selinux.status != "disabled")

# Boot-enable MariaDB on both families (slurmdbd + the mysql_user task depend on it,
# and it must survive a reboot). On Debian the apt preset starts it but does not
# guarantee enablement.
- name: Start mariadb
  ansible.builtin.systemd:
    name: mariadb
    state: started
    enabled: true
    daemon_reload: true

# community.mysql.mysql_user is the working module name (community.mysql 5.x ships
# it); the fqcn[canonical] suggestion to use the future ansible.mysql redirect is
# suppressed so this stays valid on the pinned collection.
- name: Setup slurm db user  # noqa: fqcn[canonical]
  community.mysql.mysql_user:
    name: "{{ slurm_db_username }}"
    password: "{{ slurm_db_password }}"
    host: localhost
    priv: "*.*:USAGE/slurm_acct_db.*:ALL"
    state: present
    # Authenticate over the local MariaDB unix socket -- on Debian/Ubuntu
    # root@localhost uses unix_socket auth by default. Path is OS-specific.
    login_user: root
    login_unix_socket: "{{ '/var/run/mysqld/mysqld.sock' if ansible_os_family == 'Debian' else '/var/lib/mysql/mysql.sock' }}"
    column_case_sensitive: true
  become: true

- name: Create slurm directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: slurm
    mode: "0755"
  with_items:
    - "{{ slurm_config_dir }}"
    - /var/spool/slurm/ctld
    - /var/log/slurm

- name: Create slurm directories for nfs sharing
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: slurm
    mode: "0755"
  with_items:
    - "{{ slurmctl_config_dir }}"
  when: slurm_conf_symlink

- name: Create slurm HA directory
  ansible.builtin.file:
    path: "{{ slurm_ha_state_save_location }}"
    state: directory
    owner: slurm
    mode: "0755"
  when: slurm_enable_ha

- name: Configure slurm.conf
  ansible.builtin.template:
    src: "{{ slurm_conf_template }}"
    dest: "{{ slurm_config_dir }}/slurm.conf"
    mode: "0644"
  when: not slurm_conf_symlink
  notify:
    - Restart slurmctld
  tags:
    - config

# Deploy the lua job_submit plugin only when slurm.conf enables it
# (slurm_job_submit_plugins includes "lua"). Must live in the slurm config dir.
# https://slurm.schedmd.com/archive/slurm-25.11.6/job_submit_plugins.html
- name: Configure job_submit.lua
  ansible.builtin.template:
    src: "{{ slurm_job_submit_template }}"
    dest: "{{ slurm_config_dir }}/job_submit.lua"
    mode: "0644"
  when: "'lua' in (slurm_job_submit_plugins | default(''))"
  notify:
    - Restart slurmctld
  tags:
    - config

- name: Configure slurm.conf to nfs
  ansible.builtin.template:
    src: "{{ slurm_conf_template }}"
    dest: "{{ slurmctl_config_dir }}/slurm.conf"
    mode: "0644"
  when: slurm_conf_symlink
  tags:
    - config

- name: Complete slurm.conf
  ansible.builtin.file:
    path: "{{ slurm_config_dir }}/slurm.conf"
    state: link
    src: "{{ slurmctl_config_dir }}/slurm.conf"
    force: true
  when: slurm_conf_symlink
  notify:
    - Restart slurmctld
  tags:
    - config

- name: Configure slurmdbd.conf
  ansible.builtin.template:
    src: "{{ slurm_dbd_conf_template }}"
    dest: "{{ slurm_config_dir }}/slurmdbd.conf"
    owner: "{{ slurm_username }}"
    mode: "0600"
  notify:
    - Restart slurmdbd
  tags:
    - config

# Also place cgroup.conf/gres.conf on the controller: compute.yml (which normally
# templates them) only runs on is_compute nodes, so a controller that is also the
# NFS config source, or a combined head+compute node, would otherwise lack them.
- name: Configure cgroup.conf
  ansible.builtin.template:
    src: "{{ slurm_cgroup_conf_template }}"
    dest: "{{ slurm_config_dir }}/cgroup.conf"
    mode: "0644"
  notify:
    - Restart slurmctld
  tags:
    - config

- name: Configure gres.conf
  ansible.builtin.template:
    src: "{{ slurm_gres_conf_template }}"
    dest: "{{ slurm_config_dir }}/gres.conf"
    mode: "0644"
  notify:
    - Restart slurmctld
  tags:
    - config

- name: Restart slurmdbd
  ansible.builtin.systemd:
    name: slurmdbd
    state: restarted
    enabled: true
    daemon-reload: true

- name: Wait for slurmdbd to be available
  ansible.builtin.wait_for:
    port: 6819
    delay: 5

- name: Create cluster
  ansible.builtin.command: sacctmgr -i add cluster {{ slurm_cluster_name }}
  register: create_cluster_result
  failed_when: "create_cluster_result.rc != 0 and 'already exists' not in create_cluster_result.stdout"
  changed_when: "'already exists' not in create_cluster_result.stdout"
  environment:
    PATH: "{{ slurm_install_prefix }}/bin:{{ ansible_env.PATH }}"
  run_once: true

- name: Create account
  ansible.builtin.command: sacctmgr -i add account {{ slurm_acct_account }} Description="Compute Accounts" Organization="{{ slurm_acct_organization }}"
  register: create_account_result
  failed_when: >
    create_account_result.rc != 0 and
    'Nothing new added' not in create_account_result.stdout and
    'Nothing added' not in create_account_result.stdout and
    'Already existing' not in create_account_result.stdout
  changed_when: >
    'Nothing new added' not in create_account_result.stdout and
    'Nothing added' not in create_account_result.stdout and
    'Already existing' not in create_account_result.stdout
  environment:
    PATH: "{{ slurm_install_prefix }}/bin:{{ ansible_env.PATH }}"

- name: Create users
  ansible.builtin.command: sacctmgr -i create user {{ item }} account={{ slurm_acct_account }} adminlevel=None
  register: create_user_result
  failed_when: >
    create_user_result.rc != 0 and
    'Nothing new added' not in create_user_result.stdout and
    'Nothing added' not in create_user_result.stdout and
    'Already existing' not in create_user_result.stdout
  changed_when: >
    'Nothing new added' not in create_user_result.stdout and
    'Nothing added' not in create_user_result.stdout and
    'Already existing' not in create_user_result.stdout
  with_items:
    - "{{ user }}"
  environment:
    PATH: "{{ slurm_install_prefix }}/bin:{{ ansible_env.PATH }}"

- name: Clear slurm state when downgrading
  ansible.builtin.command: slurmctld -i
  when: slurm_downgrade
  environment:
    PATH: "{{ slurm_install_prefix }}/bin:{{ ansible_env.PATH }}"

- name: Wait for slurmctld to start
  ansible.builtin.pause:
    seconds: 20
  when: slurm_downgrade

- name: Kill slurmctld
  ansible.builtin.command: killall slurmctld
  failed_when: false
  when: slurm_downgrade

- name: Restart slurmctld
  ansible.builtin.systemd:
    name: slurmctld
    state: restarted
    enabled: true
    daemon-reload: true
