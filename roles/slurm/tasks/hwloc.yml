---
- name: Default to building hwloc
  ansible.builtin.set_fact:
    hwloc_build: true

- name: Check installed hwloc version
  ansible.builtin.shell: "{{ hwloc_install_prefix }}/bin/hwloc-info --version | awk '{print $2}'"
  register: hwloc_info_version
  ignore_errors: true
  changed_when: hwloc_info_version.rc != 0

- name: Don't build hwloc if it's already installed, unless forced
  ansible.builtin.set_fact:
    hwloc_build: false
  when: hwloc_info_version.stdout == hwloc_version and not hwloc_force_rebuild

- name: Install hwloc build dependencies
  ansible.builtin.apt:
    name: "{{ item }}"
  with_items: "{{ slurm_hwloc_deps }}"
  when: ansible_distribution == 'Ubuntu'

- name: Install hwloc build dependencies
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  with_items: "{{ slurm_hwloc_deps }}"
  when: ansible_os_family == 'RedHat'

- name: Remove hwloc packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
  with_items:
    - hwloc
    - libhwloc-dev
    - libhwloc5
  when: ansible_distribution == 'Ubuntu'
  failed_when: false

- name: Remove hwloc packages
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: absent
  with_items:
    - hwloc-devel
    - hwloc-libs
    - hwloc
  when: ansible_os_family == 'RedHat'
  failed_when: false

- name: When building, try to uninstall first before downloading source
  when: hwloc_build
  block:
    - name: Check that we have an old build dir
      ansible.builtin.stat:
        path: "{{ hwloc_build_dir }}"
      register: hwloc_old_build_dir

    - name: Uninstall old version
      ansible.builtin.command: make -j uninstall
      args:
        chdir: "{{ hwloc_build_dir }}"
      ignore_errors: true
      when: hwloc_old_build_dir.stat.exists

    - name: Remove old build dir
      ansible.builtin.file:
        path: "{{ hwloc_build_dir }}"
        state: absent

- name: Make hwloc build directory
  ansible.builtin.file:
    path: "{{ hwloc_build_dir }}"
    state: directory
    mode: "0755"
  when: hwloc_build

- name: Download hwloc source
  ansible.builtin.unarchive:
    src: "{{ hwloc_src_url }}"
    remote_src: true
    dest: "{{ hwloc_build_dir }}"
    extra_opts:
      - --strip-components=1
  environment: "{{ proxy_env if proxy_env is defined else {} }}"
  register: hwloc_download
  until: hwloc_download is succeeded
  retries: 5
  delay: 10
  when: hwloc_build

- name: Clean hwloc src dir
  ansible.builtin.command: make distclean
  args:
    chdir: "{{ hwloc_build_dir }}"
  failed_when: false
  when: hwloc_build

- name: Configure hwloc
  ansible.builtin.command: "{{ hwloc_configure }}"
  args:
    chdir: "{{ hwloc_build_dir }}"
  when: hwloc_build

- name: Build hwloc
  ansible.builtin.shell: "make -j$(nproc) > build.log 2>&1"
  args:
    chdir: "{{ hwloc_build_dir }}"
  when: hwloc_build

- name: Install hwloc
  ansible.builtin.shell: "make -j$(nproc) install >> build.log 2>&1"
  args:
    chdir: "{{ hwloc_build_dir }}"
  when: hwloc_build
