---
# ##########################################
# Install dependencies
# ##########################################

- name: Setup role
  ansible.builtin.include_tasks: setup-role.yml
- name: Configure alternative library path
  ansible.builtin.template:
    src: etc/ld.so.conf.d/slurm.conf.j2
    dest: /etc/ld.so.conf.d/slurm.conf
    mode: "0644"
  register: updated_slurm_ld

- name: Update ld cache
  ansible.builtin.command: ldconfig
  when: updated_slurm_ld.changed # noqa no-handler

- name: Setup munge
  ansible.builtin.include_tasks: munge.yml
- name: Setup hwlock
  ansible.builtin.include_tasks: hwloc.yml
  tags: hwloc
  when: slurm_include_hwloc

- name: Setup pmix
  ansible.builtin.include_tasks: pmix.yml
  tags: pmix
  when: slurm_include_pmix

###########################################
# Build Slurm
###########################################
- name: Default to building slurm
  ansible.builtin.set_fact:
    slurm_build: true
    slurm_upgrade: false
    slurm_downgrade: false

- name: Check installed slurm version
  ansible.builtin.shell: "{{ slurm_install_prefix }}/sbin/slurmd --version | awk '{print $2}'"
  register: slurmd_reported_version
  ignore_errors: true
  changed_when: slurmd_reported_version.rc != 0

- name: Don't build slurm if it's already installed, unless forced
  ansible.builtin.set_fact:
    slurm_build: false
  when: slurmd_reported_version.stdout == slurm_version and not slurm_force_rebuild

- name: Upgrade?
  ansible.builtin.set_fact:
    slurm_upgrade: true
  when: slurmd_reported_version.stdout and slurmd_reported_version.stdout is version(slurm_version, '<')

- name: Downgrade?
  ansible.builtin.set_fact:
    slurm_downgrade: true
  when: slurmd_reported_version.stdout and slurmd_reported_version.stdout is version(slurm_version, '>')

- name: Going to rebuild slurm?
  ansible.builtin.debug:
    msg: "Rebuild Slurm? {{ slurm_build }}"

- name: Install build dependencies
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  with_items: "{{ slurm_build_deps }}"
  when: ansible_distribution == 'Ubuntu'

- name: Install build dependencies
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
    # The CodeReady Builder repo is named "powertools" on EL8 but was renamed to
    # "crb" on EL9+ (Rocky/Alma/CentOS Stream). On RHEL proper, enable the
    # codeready-builder-for-rhel-<N> repo via subscription-manager beforehand.
    enablerepo: "{{ 'powertools' if ansible_distribution_major_version == '8' else 'crb' }}"
  with_items: "{{ slurm_build_deps }}"
  when: ansible_os_family == 'RedHat'

- name: Remove slurm packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
  with_items:
    - slurm
    - slurm-wlm
    - slurmctld
    - slurmdbd
    - slurmd
  when: ansible_distribution == 'Ubuntu'
  failed_when: false

- name: Remove slurm packages
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: absent
  with_items:
    - slurm
  when: ansible_os_family == 'RedHat'
  failed_when: false

- name: Gather service facts
  ansible.builtin.service_facts:

- name: When building, try to uninstall first before downloading source
  when: slurm_build
  block:
    # This service should be stopped before uninstalling slurm
    - name: Stop docker slurm exporter service to prevent subfolder creation
      ansible.builtin.service:
        name: "docker.slurm-exporter.service"
        state: stopped
      when: (ansible_distribution == 'Ubuntu') and ("docker.slurm-exporter.service" in ansible_facts.services)

    - name: Check that we have an old build dir
      ansible.builtin.stat:
        path: "{{ slurm_build_dir }}"
      register: slurm_old_build_dir

    - name: Uninstall old verson
      ansible.builtin.command: make -j uninstall
      args:
        chdir: "{{ slurm_build_dir }}"
      ignore_errors: true
      when: slurm_old_build_dir.stat.exists

    - name: Remove old build dir
      ansible.builtin.file:
        path: "{{ slurm_build_dir }}"
        state: absent

    - name: Remove old lib dir
      ansible.builtin.file:
        path: "{{ slurm_install_prefix }}/lib/slurm"
        state: absent

- name: Make build directory
  ansible.builtin.file:
    path: "{{ slurm_build_dir }}"
    state: directory
    mode: "0755"
  when: slurm_build

- name: Download source
  ansible.builtin.unarchive:
    src: "{{ slurm_src_url }}"
    remote_src: true
    dest: "{{ slurm_build_dir }}"
    extra_opts:
      - --strip-components=1
  environment: "{{ proxy_env if proxy_env is defined else {} }}"
  when: slurm_build

- name: Clean src dir
  ansible.builtin.command: make distclean
  args:
    chdir: "{{ slurm_build_dir }}"
  failed_when: false
  when: slurm_build

- name: Configure
  ansible.builtin.command: "{{ slurm_configure }}"
  args:
    chdir: "{{ slurm_build_dir }}"
  when: slurm_build and (not slurm_autodetect_nvml)

- name: Configure
  ansible.builtin.command: "{{ slurm_configure_nvml }}"
  args:
    chdir: "{{ slurm_build_dir }}"
  when: slurm_build and slurm_autodetect_nvml

- name: Build
  ansible.builtin.shell: "make -j$(nproc) > build.log 2>&1"
  args:
    chdir: "{{ slurm_build_dir }}"
  when: slurm_build

- name: Build contrib
  ansible.builtin.shell: "make -j$(nproc) contrib >> build.log 2>&1"
  args:
    chdir: "{{ slurm_build_dir }}"
  when: slurm_build

- name: Install
  ansible.builtin.shell: "make -j$(nproc) install >> build.log 2>&1"
  args:
    chdir: "{{ slurm_build_dir }}"
  when: slurm_build
  notify:
    - Restart slurmd
    - Restart slurmdbd
    - Restart slurmctld

- name: Install contrib
  ansible.builtin.shell: "make -j$(nproc) install-contrib >> build.log 2>&1"
  args:
    chdir: "{{ slurm_build_dir }}"
  when: slurm_build
  notify:
    - Restart slurmd
    - Restart slurmdbd
    - Restart slurmctld

- name: Build pam_slurm_adopt
  ansible.builtin.shell: "make -j$(nproc) >> ../../build.log 2>&1"
  args:
    chdir: "{{ slurm_build_dir }}/contribs/pam_slurm_adopt"
  when: slurm_build

- name: Install pam_slurm_adopt
  ansible.builtin.shell: "make -j$(nproc) install >> ../../build.log 2>&1"
  args:
    chdir: "{{ slurm_build_dir }}/contribs/pam_slurm_adopt"
  when: slurm_build
  notify:
    - Restart slurmd
    - Restart slurmdbd
    - Restart slurmctld

- name: Fix library dir permissions
  ansible.builtin.file:
    path: "{{ slurm_install_prefix }}/lib/slurm"
    state: directory
    mode: "0775"

- name: Fix deepops dir permissions
  ansible.builtin.file:
    path: "{{ deepops_dir }}"
    state: directory
    mode: "0755"
    recurse: true

- name: Start docker slurm exporter service again
  ansible.builtin.service:
    name: "docker.slurm-exporter.service"
    state: restarted
  when: (ansible_distribution == 'Ubuntu') and ("docker.slurm-exporter.service" in ansible_facts.services)
