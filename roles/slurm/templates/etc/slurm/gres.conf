{# gres.conf for Slurm 25.11.x — https://slurm.schedmd.com/archive/slurm-25.11.6/gres.conf.html
   AutoDetect=nvml (requires NVML) detects GPUs including MIG and NVLink topology;
   the fallback enumerates Name=gpu File=/dev/nvidiaN with detected core affinity. #}
{% if slurm_autodetect_nvml -%}
AutoDetect=nvml
{% else -%}
{% set cpu_topology = ansible_local["topology"]["cpu_topology"] -%}
{% set gpu_topology = ansible_local["topology"]["gpu_topology"] -%}
{% for affinity in gpu_topology %}
Name=gpu File=/dev/nvidia{{ loop.index0 }} Cores={{ affinity }}
{% endfor %}
{% endif -%}
