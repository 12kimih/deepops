{# gres.conf for Slurm 25.11.x — https://slurm.schedmd.com/archive/slurm-25.11.6/gres.conf.html
   Three modes (most to least automatic):
   1. slurm_gres_raw: literal per-NodeName lines from config/group_vars (MIG/MPS,
      mixed GPU types, hand-tuned core affinity) — full control.
   2. AutoDetect=nvml (requires Slurm built with NVML / libnvidia-ml): detects GPUs
      including MIG devices and NVLink topology, and fills Cores/Links automatically.
   3. Manual fallback: enumerate Name=gpu File=/dev/nvidiaN with detected core
      affinity (Type optional). NOTE: File= is single-device and WRONG for MIG —
      use slurm_gres_raw with MultipleFiles= for MIG cards. #}
{% if slurm_gres_raw %}
{% for line in slurm_gres_raw %}
{{ line }}
{% endfor %}
{% elif slurm_autodetect_nvml -%}
AutoDetect=nvml
{% else -%}
{% set cpu_topology = ansible_local["topology"]["cpu_topology"] -%}
{% set gpu_topology = ansible_local["topology"]["gpu_topology"] -%}
{% for affinity in gpu_topology %}
Name=gpu {% if slurm_gpu_type is defined %}Type={{ slurm_gpu_type }} {% endif %}File=/dev/nvidia{{ loop.index0 }} Cores={{ affinity }}
{% endfor %}
{% endif -%}
