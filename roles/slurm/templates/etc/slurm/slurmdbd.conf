#
# slurmdbd.conf for Slurm 25.11.x.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurmdbd.conf.html
# Minimum required: AuthType, DbdHost, StorageType (+ StoragePass for mysql).
#
# Authentication
AuthType=auth/munge
#AuthInfo=/var/run/munge/munge.socket.2
#
# slurmdbd daemon. DbdHost must be a real hostname that slurmctld can resolve;
# it matches AccountingStorageHost in slurm.conf. DbdPort default is 6819.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurmdbd.conf.html
DbdHost={{ groups["slurm-master"][0] }}
#DbdPort=6819
SlurmUser={{ slurm_username }}
DebugLevel={{ slurmdbd_debug_level | default('info') }}
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/var/run/slurmdbd.pid
PluginDir={{ slurm_install_prefix }}/lib/slurm
#CommitDelay=1                       # batch DB commits on high-throughput sites
#TrackSlurmctldDown=no               # log time slurmctld was unreachable (default no)
# PrivateData hides other users' accounting data from regular users (admins still
# see all). Recommended on shared clusters: accounts,jobs,usage,users.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurmdbd.conf.html (PrivateData)
#PrivateData=accounts,jobs,usage,users
#
# Database (MySQL/MariaDB). StoragePort default is 3306.
StorageType=accounting_storage/mysql
#StorageHost=localhost
#StoragePort=3306
StorageUser={{ slurm_db_username }}
StoragePass={{ slurm_db_password }}
StorageLoc=slurm_acct_db
#
# Archive + purge: roll old accounting rows out of the live DB. Values take a
# month/day/hour suffix (e.g. 12months). Set ArchiveDir to a persistent path if
# you keep the dumped records. https://slurm.schedmd.com/archive/slurm-25.11.6/slurmdbd.conf.html (PurgeJobAfter)
#ArchiveDir=/var/log/slurm/archive
#ArchiveEvents=yes
#ArchiveJobs=yes
#ArchiveResvs=yes
#ArchiveSteps=yes
#ArchiveSuspend=yes
#ArchiveTXN=yes
#ArchiveUsage=yes
#PurgeEventAfter=12months
#PurgeJobAfter=12months
#PurgeResvAfter=2months
#PurgeStepAfter=1month
#PurgeSuspendAfter=1month
#PurgeTXNAfter=12months
#PurgeUsageAfter=24months
