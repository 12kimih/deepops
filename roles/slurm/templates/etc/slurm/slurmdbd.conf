#
# slurmdbd.conf for Slurm 25.11.x.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurmdbd.conf.html
# Minimum required: AuthType, DbdHost, StorageType (+ StoragePass for mysql).
#
# Authentication
AuthType=auth/munge
#AuthInfo=/var/run/munge/munge.socket.2
#
# slurmdbd daemon. DbdHost must be a real hostname that slurmctld can resolve;
# it matches AccountingStorageHost in slurm.conf. DbdPort default is 6819.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurmdbd.conf.html
DbdHost={{ groups["slurm-master"][0] }}
#DbdPort=6819
SlurmUser={{ slurm_username }}
DebugLevel={{ slurmdbd_debug_level | default('info') }}
LogFile=/var/log/slurm/slurmdbd.log
# slurmdbd runs as SlurmUser; its pidfile goes in the systemd RuntimeDirectory
# (/run/slurmdbd, created owned by SlurmUser each boot), like slurmctld.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurmdbd.conf.html#OPT_PidFile
PidFile=/var/run/slurmdbd/slurmdbd.pid
PluginDir={{ slurm_install_prefix }}/lib/slurm
{% if slurm_dbd_commit_delay is defined and slurm_dbd_commit_delay %}
CommitDelay={{ slurm_dbd_commit_delay }}
{% else %}
#CommitDelay=1                       # batch DB commits on high-throughput sites
{% endif %}
#TrackSlurmctldDown=no               # log time slurmctld was unreachable (default no)
# PrivateData hides other users' accounting data from regular users (admins still
# see all). Recommended on shared clusters: accounts,jobs,usage,users.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurmdbd.conf.html (PrivateData)
#PrivateData=accounts,jobs,usage,users
#
# Database (MySQL/MariaDB). StoragePort default is 3306.
StorageType=accounting_storage/mysql
#StorageHost=localhost
#StoragePort=3306
StorageUser={{ slurm_db_username }}
StoragePass={{ slurm_db_password }}
StorageLoc=slurm_acct_db
#
# Archive + purge: roll old accounting rows out of the live DB (purge), dumping them
# to flat files first (archive -> ArchiveDir). Off by default (Slurm keeps all data);
# enable with slurm_dbd_archive_purge: true in config/group_vars. Purge values are a
# number of months ('months'/'days'/'hours' suffix per the docs).
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurmdbd.conf.html (PurgeJobAfter)
{% if slurm_dbd_archive_purge | default(false) %}
ArchiveDir={{ slurm_dbd_archive_dir | default('/var/log/slurm/archive') }}
ArchiveEvents=yes
ArchiveJobs=yes
ArchiveResvs=yes
ArchiveSteps=yes
ArchiveSuspend=yes
ArchiveTXN=yes
ArchiveUsage=yes
PurgeEventAfter={{ slurm_dbd_purge_event | default('12months') }}
PurgeJobAfter={{ slurm_dbd_purge_job | default('12months') }}
PurgeResvAfter={{ slurm_dbd_purge_resv | default('2months') }}
PurgeStepAfter={{ slurm_dbd_purge_step | default('2months') }}
PurgeSuspendAfter={{ slurm_dbd_purge_suspend | default('2months') }}
PurgeTXNAfter={{ slurm_dbd_purge_txn | default('12months') }}
PurgeUsageAfter={{ slurm_dbd_purge_usage | default('24months') }}
{% else %}
#ArchiveDir=/var/log/slurm/archive
#ArchiveEvents=yes
#ArchiveJobs=yes
#ArchiveResvs=yes
#ArchiveSteps=yes
#ArchiveSuspend=yes
#ArchiveTXN=yes
#ArchiveUsage=yes
#PurgeEventAfter=12months
#PurgeJobAfter=12months
#PurgeResvAfter=2months
#PurgeStepAfter=2months
#PurgeSuspendAfter=2months
#PurgeTXNAfter=12months
#PurgeUsageAfter=24months
{% endif %}
