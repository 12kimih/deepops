# Cgroup configuration for Slurm 25.11.x.
# https://slurm.schedmd.com/archive/slurm-25.11.6/cgroup.conf.html
#
# cgroup/v1 is deprecated in 25.11. CgroupPlugin=autodetect selects cgroup/v2 on
# modern hosts (Ubuntu 22.04+ and RHEL/Rocky 9+ default to unified cgroup/v2; on
# EL8 boot with systemd.unified_cgroup_hierarchy=1). CgroupAutomount and the
# v1-only Kmem tuning keys (AllowedKmemSpace/MaxKmemPercent) were removed.
CgroupPlugin=autodetect

# ConstrainCores pairs with TaskPlugin=task/cgroup,task/affinity for CPU pinning.
# ConstrainDevices is what restricts each job to ONLY its allocated GPUs.
# https://slurm.schedmd.com/archive/slurm-25.11.6/cgroup.conf.html#OPT_ConstrainDevices
ConstrainCores=yes
ConstrainDevices=yes
# ConstrainRAMSpace/ConstrainSwapSpace are no-ops unless CR_*_Memory is set in
# slurm.conf SelectTypeParameters (it is: CR_Core_Memory). On Debian/Ubuntu,
# ConstrainSwapSpace silently does nothing unless the kernel was booted with
# 'cgroup_enable=memory swapaccount=1' (GRUB_CMDLINE_LINUX).
# https://slurm.schedmd.com/archive/slurm-25.11.6/cgroup.conf.html#SECTION_DISTRIBUTION-SPECIFIC-NOTES
ConstrainRAMSpace=yes
ConstrainSwapSpace=yes

# Signal all child processes so scancel/suspend cleanly kills multi-process GPU
# jobs (torchrun, mpirun, python multiprocessing); the default 'no' only signals
# the parent and can leave orphaned processes holding GPU memory.
# https://slurm.schedmd.com/archive/slurm-25.11.6/cgroup.conf.html#OPT_SignalChildrenProcesses
SignalChildrenProcesses=yes
