#
# slurm.conf for DeepOps, targeting Slurm 25.11.x on an AI/ML GPU cluster.
# Structure follows the official 25.11.6 configurator default template, merged
# with DeepOps templating and GPU/enroot+pyxis best practices.
#
# Reference: https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html
# Configurator: https://slurm.schedmd.com/archive/slurm-25.11.6/configurator.html
#
# Upgrade note: CryptoType, FastSchedule and SelectType=select/cons_res were
# removed; this file uses the current AuthType/CredType defaults and
# SelectType=select/cons_tres. SwitchType=switch/none is also gone (omitted).
#
ClusterName={{ slurm_cluster_name }}

# Controllers
{% if slurm_enable_ha %}
{% for node_name in groups['slurm-master'] %}
SlurmctldHost={{ node_name }}
{% endfor %}
StateSaveLocation={{ slurm_ha_state_save_location }}
{% else %}
SlurmctldHost={{ groups['slurm-master'][0] }}
StateSaveLocation=/var/spool/slurmctld
{% endif %}

SlurmUser={{ slurm_username }}
SlurmctldPort=6817
SlurmdPort=6818
AuthType=auth/munge
SlurmdSpoolDir=/var/spool/slurmd
# PID files go INSIDE each daemon's systemd RuntimeDirectory: /run/slurmctld for
# slurmctld and /run/slurm for slurmd (the slurmd unit ships RuntimeDirectory=slurm).
# systemd recreates these dirs owned by SlurmUser every boot; slurmctld runs as
# SlurmUser and cannot write a pidfile directly into root-owned /run. The 25.11 units
# set no PIDFile= and track the daemon via sd_notify, so this path is purely for tools.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_SlurmctldPidFile
SlurmctldPidFile=/var/run/slurmctld/slurmctld.pid
SlurmdPidFile=/var/run/slurm/slurmd.pid
PluginDir={{ slurm_install_prefix }}/lib/slurm
# proctrack/cgroup is required for PrologFlags=Contain and pam_slurm_adopt.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_ProctrackType
ProctrackType=proctrack/cgroup
# task/affinity sets the CPU mask; task/cgroup fences tasks into the allocated
# CPUs (needs ConstrainCores=yes in cgroup.conf). Required for correct CPU/GPU
# pinning of enroot+pyxis containers.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_TaskPlugin
# "It is recommended to stack task/cgroup,task/affinity together... and setting ConstrainCores=yes in cgroup.conf."
TaskPlugin=task/cgroup,task/affinity
# NONE = jobs inherit slurmd's own (high) ulimits rather than the submitter's shell
# limits. The slurmd systemd unit sets LimitMEMLOCK=infinity / LimitSTACK=infinity /
# LimitNOFILE=131072 -- exactly what GPU/NCCL/CUDA pinned-memory jobs need; a low
# MEMLOCK leaking in from a user's login shell breaks cudaHostAlloc/ibv_reg_mr/NCCL.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_PropagateResourceLimits
PropagateResourceLimits=NONE
ReturnToService={{ slurm_return_to_service }}
RebootProgram="{{ slurm_reboot_program }}"
ResumeTimeout={{ slurm_resume_timeout }}
MailProg=/usr/bin/s-nail
{% if slurm_include_pmix %}
# pmix is the modern PMIx wire protocol used by current OpenMPI/UCX and required
# by multi-node NCCL jobs; Slurm is built --with-pmix. srun can override per-job.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_MpiDefault
MpiDefault=pmix
{% endif %}

# Site policy at submit time (default GRES, partition routing). Deploys a
# job_submit.lua in this config dir (must be named exactly job_submit.lua).
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_JobSubmitPlugins
{% if slurm_job_submit_plugins is defined and slurm_job_submit_plugins %}
JobSubmitPlugins={{ slurm_job_submit_plugins }}
{% endif %}

# Prolog/epilog. Contain creates the per-allocation cgroup that pam_slurm_adopt
# drops SSH logins into and implicitly sets Alloc; Serial is dropped (documented
# throughput penalty). Do not add X11 here (Slurm is built --disable-x11).
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_Contain
# "Setting the Contain implicitly sets the Alloc flag."
{% if slurm_contain_ssh is defined %}
PrologFlags={{ slurm_prolog_flags | default('Contain') }}
{% else %}
PrologFlags={{ slurm_prolog_flags | default('Alloc') }}
{% endif %}
{% if slurm_enable_prolog_epilog %}
Prolog={{ slurm_config_dir }}/prolog.sh
Epilog={{ slurm_config_dir }}/epilog.sh
{% endif %}

{% if slurm_health_check_program is defined %}
# ANY/ALLOC lets GPU health checks (e.g. NHC) catch Xid errors on busy nodes too.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_HealthCheckNodeState
HealthCheckProgram={{ slurm_health_check_program }}
HealthCheckInterval=300
HealthCheckNodeState={{ slurm_health_check_node_state | default('IDLE') }}
{% endif %}

# TIMERS
SlurmctldTimeout=120
SlurmdTimeout=300
InactiveLimit=0
MinJobAge={{ slurm_min_job_age | default(300) }}
KillWait=120
Waittime=0

# SCHEDULING
SchedulerType=sched/backfill
# Tune backfill for long training runs and deep GPU queues (size bf_window to the
# max walltime). cons_tres is required for GPU/GRES tracking.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_SchedulerParameters
{% if slurm_scheduler_parameters is defined and slurm_scheduler_parameters %}
SchedulerParameters={{ slurm_scheduler_parameters }}
{% endif %}
SelectType=select/cons_tres
# CR_Core_Memory is the cons_tres default and prevents RAM oversubscription;
# CR_CORE_DEFAULT_DIST_BLOCK keeps GPU/core locality. CR_ONE_TASK_PER_CORE is
# intentionally not set (it suppresses hyperthread-level task placement).
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_CR_Core_Memory
SelectTypeParameters={{ slurm_select_type_parameters | default('CR_Core_Memory,CR_CORE_DEFAULT_DIST_BLOCK') }}

# JOB PRIORITY
# Multifactor priority. Weights scale each normalized (0-1) factor; what matters is
# their RATIO. Fairshare + QOS always render; Age/Partition/TRES are opt-in (render
# only when set in config/group_vars). PriorityWeightTRES="GRES/gpu=1000" makes GPU
# usage drive fairshare, but is redundant when partitions already set TRESBillingWeights.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_PriorityWeightFairshare
{% if slurm_enable_fairshare | default(true) %}
PriorityType=priority/multifactor
{% if slurm_priority_calc_period is defined and slurm_priority_calc_period %}
PriorityCalcPeriod={{ slurm_priority_calc_period }}
{% endif %}
PriorityDecayHalfLife={{ slurm_priority_decay_halflife | default('7-0') }}
{% if slurm_priority_flags is defined and slurm_priority_flags %}
PriorityFlags={{ slurm_priority_flags }}
{% endif %}
PriorityWeightFairshare={{ slurm_priority_weight_fairshare | default(100000) }}
PriorityWeightQOS={{ slurm_priority_weight_qos | default(10000) }}
{% if slurm_priority_weight_age is defined and slurm_priority_weight_age %}
PriorityWeightAge={{ slurm_priority_weight_age }}
{% endif %}
{% if slurm_priority_weight_partition is defined and slurm_priority_weight_partition %}
PriorityWeightPartition={{ slurm_priority_weight_partition }}
{% endif %}
{% if slurm_manage_gpus and slurm_priority_weight_tres is defined and slurm_priority_weight_tres %}
PriorityWeightTRES={{ slurm_priority_weight_tres }}
{% endif %}
{% endif %}

# PREEMPTION (optional). REQUEUE (not SUSPEND) for GPUs: SUSPEND leaves GPU memory
# pinned by the suspended process; REQUEUE frees the GPU cleanly. Rules are per-QOS.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_PreemptType
{% if slurm_enable_preempt | default(false) %}
PreemptType={{ slurm_preempt_type | default('preempt/qos') }}
PreemptMode={{ slurm_preempt_mode | default('REQUEUE') }}
{% endif %}

# TOPOLOGY (optional). topology/tree for multi-rack IB/Ethernet clusters so
# multi-node NCCL jobs land under a common leaf switch (needs topology.conf).
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_TopologyPlugin
{% if slurm_topology_plugin is defined and slurm_topology_plugin %}
TopologyPlugin={{ slurm_topology_plugin }}
{% endif %}

# LOGGING
SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=info
SlurmdLogFile=/var/log/slurm/slurmd.log
JobCompType=jobcomp/none

# ACCOUNTING
JobAcctGatherType=jobacct_gather/cgroup
# Sampling interval (seconds) for in-job resource usage; 30 is the Slurm default.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_JobAcctGatherFrequency
JobAcctGatherFrequency={{ slurm_jobacct_gather_frequency | default(30) }}
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost={{ groups["slurm-master"][0] }}
# slurmdbd listen port; 6819 is the build-time default (must match slurmdbd.conf DbdPort).
AccountingStoragePort={{ slurm_accounting_storage_port | default(6819) }}
# The DB user is supplied by slurmdbd.conf (StorageUser); AccountingStorageUser was
# removed from slurm.conf and an unknown keyword here is a fatal slurmctld parse error.
AccountingStoragePass=/var/run/munge/munge.socket.2
# Makes fairshare/QOS/association limits real on a shared cluster; 'safe' prevents
# jobs being killed by limits mid-run. Avoid bare 'all'.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_AccountingStorageEnforce
{% if slurm_accounting_enforce is defined and slurm_accounting_enforce %}
AccountingStorageEnforce={{ slurm_accounting_enforce }}
{% endif %}
{% if slurm_manage_gpus %}
# Add type-specific entries (e.g. gres/gpu:h100,gres/gpu:b200) for mixed fleets.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_AccountingStorageTRES
AccountingStorageTRES={{ slurm_accounting_tres | default('gres/gpu') }}
{% endif %}

# COMPUTE NODES
{% if slurm_manage_gpus %}
# Must be consistent on all nodes; matched by gres.conf (AutoDetect=nvml).
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_GresTypes
GresTypes=gpu
{% endif %}
{% if slurm_nodes_raw %}
{# Server-specific override: literal NodeName= lines from config/group_vars #}
{% for line in slurm_nodes_raw %}
{{ line }}
{% endfor %}
{% else %}
{% for node_name in groups['slurm-node'] %}
{% set memory =  hostvars[node_name]["ansible_local"]["memory"] -%}
{% set cpu_topology =  hostvars[node_name]["ansible_local"]["topology"]["cpu_topology"] -%}
{% set gpu_topology =  hostvars[node_name]["ansible_local"]["topology"]["gpu_topology"] -%}
    NodeName={{ node_name }}{{ " " -}}
    {% if slurm_manage_gpus %} {%- if gpu_topology|count %} Gres=gpu:{{ gpu_topology|count }} {% endif -%} {% endif %}
    CPUs={{ cpu_topology.logical_cpus|int }}{{ " " -}}
    Sockets={{ cpu_topology.sockets|int }}{{ " " -}}
    CoresPerSocket={{ cpu_topology.cores_per_socket|int }}{{ " " -}}
    ThreadsPerCore={{ cpu_topology.threads_per_core }}{{ " " -}}
    RealMemory={{ memory.total_mb|int }}{{ " " -}}
    State=UNKNOWN
{% endfor %}
{% endif %}

# PARTITIONS
# DefMemPerCPU bounds memory for --mem-less jobs (recommended with CR_Core_Memory);
# DefCpuPerGPU gives GPU-only requests CPUs for dataloaders. For per-partition
# hardware tuning, define slurm_partitions_raw in config/group_vars/slurm-cluster.yml.
# https://slurm.schedmd.com/archive/slurm-25.11.6/slurm.conf.html#OPT_DefMemPerCPU
{% if slurm_partitions_raw %}
{% for line in slurm_partitions_raw %}
{{ line }}
{% endfor %}
{% else %}
{% set slurm_oversubscribe = (slurm_manage_gpus == true)|ternary('NO', 'EXCLUSIVE') %}
{# TRESBillingWeights makes GPU usage (not just CPU count) drive fairshare + GrpTRESMins limits on a GPU cluster. Without it, an 8-GPU/8-core job bills almost nothing. Set slurm_tres_billing_weights, e.g. "CPU=1.0,Mem=0.25G,GRES/gpu=2.0". https://slurm.schedmd.com/tres.html #}
PartitionName=batch Nodes=ALL Default=YES State=UP DefMemPerCPU={{ slurm_default_mem_per_cpu | default(0) }} OverSubscribe={{ slurm_oversubscribe }}{% if slurm_tres_billing_weights is defined %} TRESBillingWeights="{{ slurm_tres_billing_weights }}"{% endif %}{% if slurm_manage_gpus and slurm_default_cpu_per_gpu is defined %} DefCpuPerGPU={{ slurm_default_cpu_per_gpu }}{% endif %}{% if slurm_max_job_timelimit is defined %} MaxTime={{ slurm_max_job_timelimit }}{% else %} MaxTime=UNLIMITED{% endif %}{% if slurm_default_job_timelimit is defined %} DefaultTime={{ slurm_default_job_timelimit }}{% endif %}
{% endif %}
