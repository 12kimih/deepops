---
slurm_pam_lib_dir: /lib/x86_64-linux-gnu/security

# Build dependencies per the Slurm 25.11.x admin quickstart. libdbus-1-dev and
# libbpf-dev are needed for the cgroup/v2 plugin; libnuma-dev, liblua5.4-dev and
# libreadline-dev enable NUMA affinity, Lua plugins (job_submit) and interactive
# scontrol. libmariadb-dev provides the MariaDB client dev headers (mysql-compatible,
# incl. mysql.h) for the accounting store -- it exists on 24.04 and coexists with an
# already-installed MariaDB. Do NOT use default-libmysqlclient-dev: it pulls
# libmysqlclient-dev (MySQL) which Conflicts/Breaks an installed libmariadb-dev. The old
# libmariadbclient-dev-compat transitional package was also removed on 24.04, so omit it.
# https://slurm.schedmd.com/archive/slurm-25.11.6/quickstart_admin.html
slurm_build_deps:
  - build-essential
  - libmunge-dev
  - libmariadb-dev
  - libpam0g-dev
  - libdbus-1-dev
  - libbpf-dev
  - libnuma-dev
  - liblua5.4-dev
  - libreadline-dev
  - python3
  - wget

# slurmrestd REST API only (installed when slurm_build_slurmrestd=true). libjwt is
# for slurmrestd's JWT token auth (rest_auth/jwt) and Slurm's auth/jwt plugin.
slurm_slurmrestd_deps:
  - libjson-c-dev
  - libhttp-parser-dev
  - libyaml-dev
  - libjwt-dev

slurm_pmix_deps:
  - build-essential
  - libev-dev
  - libevent-dev
  - zlib1g
  - zlib1g-dev
  - pandoc

slurm_hwloc_deps:
  - build-essential
