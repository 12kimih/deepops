---
collections:
  - name: ansible.posix
    version: 2.1.0

  - name: community.general
    version: 12.3.0

  - name: community.docker
    version: 5.0.6

  - name: community.mysql
    version: 5.0.2

  - name: devsec.hardening
    version: 10.5.0

roles:
  - src: https://github.com/DeepOps/ansible-role-users
    name: DeepOps.users
    version: "e67df1db28bf099aa06d0ab250478963532b4d29"

  # DeepOps.hosts (ansible-role-hosts) is now in-tree as roles/etc-hosts.

  - src: andrewrothstein.miniconda
    version: "v6.1.9"

# NVIDIA tooling is installed by in-tree roles, replacing the corresponding
# Galaxy roles: roles/nvidia_driver (was nvidia.nvidia_driver), the in-tree
# roles/nvidia_container_toolkit via nvidia-ctk (was the EOL nvidia.nvidia_docker /
# nvidia-docker2), and roles/enroot pinned to enroot 4.x (was nvidia.enroot v0.5.0,
# an EOL 3.x release without modern unprivileged-userns handling).

  - src: geerlingguy.filebeat
    version: "3.5.0"

  - src: robertdebock.java
    version: "4.2.0"

  - src: robertdebock.elastic_repo
    version: "1.1.0"

  - src: robertdebock.logstash
    version: "1.1.3"

  - src: robertdebock.elasticsearch
    version: "1.1.6"

  - src: robertdebock.kibana
    version: "1.2.6"

  - src: https://github.com/mrlesmithjr/ansible-maas.git
    name: ansible-maas
    version: "178a999c9bfc979ef32c42f4f59c034664df10d0"

  - src: https://github.com/DeepOps/ansible-role-chrony
    name: DeepOps.chrony
    version: "c9022153036dfdde4e2b313aecde4a46cd6f6687"

  - src: https://github.com/OSC/ood-ansible.git
    version: "v3.0.3"

  - src: gantsign.golang
    version: 3.5.0
