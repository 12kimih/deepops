---
- name: Find non-system users who need moving
  ansible.builtin.shell: set -o pipefail && awk '-F:' '($1!="nobody")&&($1!="{{ tmp_user }}")&&($3>=1000){print $6,$1}' /etc/passwd | grep -v "^{{
    move_home_dirs_new_root }}" | awk '{print $2}'
  changed_when: false
  register: user_list

- name: Skip if no work to do
  ansible.builtin.include_tasks: move_users.yml
  when: user_list.stdout
