#
# ansible role to install lmod:
#
---
- name: RedHat | trust GPG key for EPEL
  ansible.builtin.rpm_key:
    key: "{{ epel_key_url }}"
    state: present
  when: ansible_os_family == "RedHat"

- name: RedHat | add epel repo
  become: true
  ansible.builtin.dnf:
    name:
      - "{{ epel_package }}"
    state: present
  environment: "{{ proxy_env if proxy_env is defined else {} }}"
  when: ansible_os_family == "RedHat"

- name: "Install packages"
  become: true
  ansible.builtin.apt:
    update_cache: true
    name:
      - bash
      - tcsh
      - lmod
    state: present
  when: ansible_os_family == "Debian"

- name: "Install packages"
  become: true
  ansible.builtin.dnf:
    name:
      - bash
      - tcsh
      - Lmod
    # Lmod ships from EPEL; tcsh comes from CodeReady Builder, named "powertools"
    # on EL8 and "crb" on EL9+ (Rocky/Alma/CentOS Stream).
    enablerepo: "{{ 'powertools' if ansible_distribution_major_version == '8' else 'crb' }}"
  when: ansible_os_family == "RedHat"

- name: "Mkdir software path"
  become: true
  ansible.builtin.file:
    path: "{{ sm_software_path }}"
    state: directory
    mode: "0755"

- name: "Mkdir module path"
  become: true
  ansible.builtin.file:
    path: "{{ sm_module_path }}"
    state: directory
    mode: "0755"

- name: "Configure sh profile"
  become: true
  ansible.builtin.template:
    src: templates/z00_lmod.sh
    dest: /etc/profile.d
    owner: root
    group: root
    mode: "0755"
  tags:
    - configuration

- name: "Configure csh profile"
  become: true
  ansible.builtin.template:
    src: templates/z00_lmod.csh
    dest: /etc/profile.d
    owner: root
    group: root
    mode: "0755"
  tags:
    - configuration

- name: "Unset previous lmod setup"
  ansible.builtin.shell: unset MODULEPATH_ROOT
  register: unset_lmod_bash
  args:
    executable: /bin/bash
  changed_when: unset_lmod_bash.rc != 0

- name: "Unset previous lmod setup"
  ansible.builtin.shell: unsetenv MODULEPATH_ROOT
  register: unset_lmod_csh
  args:
    executable: /bin/csh
  changed_when: unset_lmod_csh.rc != 0

- name: "Auto load lmod"
  ansible.builtin.shell: . /etc/profile.d/z00_lmod.sh
  register: load_lmod_bash
  args:
    executable: /bin/bash
  changed_when: load_lmod_bash.rc != 0

- name: "Auto load lmod"
  ansible.builtin.shell: source /etc/profile.d/z00_lmod.csh
  register: load_lmod_csh
  args:
    executable: /bin/csh
  changed_when: load_lmod_csh.rc != 0
