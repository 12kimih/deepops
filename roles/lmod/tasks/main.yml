#
# ansible role to install lmod:
#
---
- name: RedHat | trust GPG key for EPEL
  ansible.builtin.rpm_key:
    key: "{{ epel_key_url }}"
    state: present
  when: ansible_os_family == "RedHat"

- name: RedHat | add epel repo
  become: true
  ansible.builtin.dnf:
    name:
      - "{{ epel_package }}"
    state: present
  environment: "{{ proxy_env if proxy_env is defined else {} }}"
  when: ansible_os_family == "RedHat"

- name: "Install packages"
  become: true
  ansible.builtin.apt:
    update_cache: true
    name:
      - bash
      - tcsh
      - lmod
    state: present
  when: ansible_os_family == "Debian"

- name: "Install packages"
  become: true
  ansible.builtin.dnf:
    name:
      - bash
      - tcsh
      - Lmod
    # Lmod ships from EPEL; tcsh comes from CodeReady Builder, named "powertools"
    # on EL8 and "crb" on EL9+ (Rocky/Alma/CentOS Stream).
    enablerepo: "{{ 'powertools' if ansible_distribution_major_version == '8' else 'crb' }}"
  when: ansible_os_family == "RedHat"

- name: "Mkdir software path"
  become: true
  ansible.builtin.file:
    path: "{{ sm_software_path }}"
    state: directory
    mode: "0755"

- name: "Mkdir module path"
  become: true
  ansible.builtin.file:
    path: "{{ sm_module_path }}"
    state: directory
    mode: "0755"

# Register the shared software-module tree with Lmod via LMOD_SITE_MODULEPATH (the official
# site hook). The distro lmod package's /etc/profile.d/lmod.sh -- generated from Lmod's
# init/profile.in -- initialises the `module` command and prepends every LMOD_SITE_MODULEPATH
# entry to MODULEPATH (preserved across `module reset`). Our 00- snippet sorts before lmod.sh
# so the variable is set first. This replaces the old custom z00_lmod.sh, which re-implemented
# Lmod init and hard-set MODULEPATH -- redundant now that we rely on the distro init.
# https://lmod.readthedocs.io/en/latest/090_configuring_lmod.html
- name: Register the shared module tree with Lmod (LMOD_SITE_MODULEPATH)
  become: true
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/etc/profile.d/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - {src: "00-modulepath.sh.j2", dest: "00-modulepath.sh"}
    - {src: "00-modulepath.csh.j2", dest: "00-modulepath.csh"}
  tags:
    - configuration
