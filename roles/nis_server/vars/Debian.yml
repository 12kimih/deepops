---
# Debian/Ubuntu: ypserv ships the server daemons; ypbind-mt/yp-tools provide client
# tools. ypinit lives under /usr/lib/yp; ypserv reads /etc/ypserv.securenets.
nis_server_packages:
  - ypserv
  - yp-tools
  - rpcbind
nis_server_ypinit: /usr/lib/yp/ypinit
nis_server_securenets_path: /etc/ypserv.securenets
nis_server_service: ypserv
nis_server_yppasswdd_service: yppasswdd
nis_server_ypxfrd_service: ypxfrd
